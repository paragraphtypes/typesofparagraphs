<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paragraph Skills Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #1a1a2e;
    --muted: #6b6b80;
    --accent: #2d6a6a;
    --accent-light: #e0f0f0;
    --gold: #c6963a;
    --gold-light: #fdf3de;
    --correct: #2d7a4a;
    --correct-bg: #e8f7ee;
    --wrong: #b33030;
    --wrong-bg: #fdecea;
    --hint-bg: #fffbea;
    --hint-border: #f0c040;
    --hint-text: #7a5c00;
    --border: #e4ddd4;
    --shadow: 0 4px 24px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--ink);
    padding: 0 16px 60px;
  }

  /* HEADER */
  .header { text-align: center; padding: 48px 16px 32px; }
  .header .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,42px); color: var(--ink); line-height: 1.2; }
  .header p { margin-top: 10px; color: var(--muted); font-size: 15px; max-width: 520px; margin-left: auto; margin-right: auto; }

  /* PROGRESS */
  .progress-wrap { max-width: 680px; margin: 0 auto 32px; padding: 0 8px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .progress-bar-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* CARD */
  .card { max-width: 680px; margin: 0 auto; background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .card-tag { display: flex; align-items: center; gap: 10px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: #fafafa; }
  .tag-pill { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; }
  .tag-ts  { background: #dbeafe; color: #1e40af; }
  .tag-ooo { background: #fce7f3; color: #9d174d; }
  .tag-cs  { background: #d1fae5; color: #065f46; }
  .tag-ps  { background: #ede9fe; color: #5b21b6; }
  .tag-sw  { background: #fff3cd; color: #92400e; }
  .tag-fo  { background: #fee2e2; color: #991b1b; }

  .card-body { padding: 28px 28px 10px; }
  .question-text { font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--ink); margin-bottom: 22px; }
  .para-box { background: var(--bg); border-left: 4px solid var(--gold); border-radius: 0 10px 10px 0; padding: 16px 20px; font-size: 14.5px; line-height: 1.8; color: #333; margin-bottom: 22px; font-style: italic; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    width: 100%; text-align: left;
    padding: 14px 18px;
    border: 2px solid var(--border); border-radius: 12px;
    background: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14.5px; line-height: 1.55; color: var(--ink);
    cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); transform: translateX(3px); }
  .option-btn:disabled { cursor: default; }
  .option-btn.state-correct  { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .option-btn.state-wrong    { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .option-btn.state-hinted   { border-color: var(--hint-border); background: var(--hint-bg); }
  .option-btn.state-reveal-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }

  .opt-letter {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; flex-shrink: 0; margin-top: 1px;
    border-radius: 50%; background: var(--border);
    font-size: 12px; font-weight: 700;
    transition: background 0.2s, color 0.2s;
  }
  .option-btn.state-correct .opt-letter,
  .option-btn.state-reveal-correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.state-wrong .opt-letter    { background: var(--wrong); color: #fff; }
  .option-btn.state-hinted .opt-letter   { background: var(--hint-border); color: #fff; }

  /* ODD ONE OUT */
  .sentences { display: flex; flex-direction: column; gap: 10px; }
  .sentence-btn {
    width: 100%; text-align: left;
    padding: 13px 18px; border: 2px solid var(--border); border-radius: 12px;
    background: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.65; color: var(--ink);
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .sentence-btn:hover:not(:disabled) { border-color: #9d174d; background: #fce7f3; }
  .sentence-btn:disabled { cursor: default; }
  .sentence-btn.state-correct        { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-hinted         { border-color: var(--hint-border); background: var(--hint-bg); }
  .sentence-btn.state-reveal-correct { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-reveal-wrong   { border-color: var(--border); opacity: 0.6; }

  /* HINT BOX */
  .hint-box {
    display: none; margin-top: 14px;
    padding: 12px 16px; border-radius: 10px;
    background: var(--hint-bg); border: 1px solid var(--hint-border);
    font-size: 13.5px; line-height: 1.6; color: var(--hint-text);
  }
  .hint-box.show { display: block; animation: fadeUp 0.25s ease both; }
  .hint-box strong { font-weight: 700; }
  .hint-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--hint-border); margin-bottom: 5px; }

  /* SHOW ME WHY BUTTON */
  .show-why-wrap { display: none; margin-top: 10px; }
  .show-why-wrap.show { display: block; }
  .show-why-btn {
    background: none; border: 2px solid var(--ink); border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600; color: var(--ink);
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .show-why-btn:hover { background: var(--ink); color: #fff; }

  /* FEEDBACK (explanation) */
  .feedback { display: none; margin-top: 14px; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .feedback.show { display: block; animation: fadeUp 0.3s ease both; }
  .feedback.fb-correct { background: var(--correct-bg); color: #065f46; border: 1px solid #a7f3d0; }
  .feedback.fb-wrong   { background: #f0f4ff; color: #1e3a8a; border: 1px solid #bfdbfe; }

  /* NEXT BUTTON */
  .next-wrap { padding: 14px 28px 28px; display: none; }
  .next-wrap.show { display: block; }
  .next-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: #fff; border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px; transition: background 0.2s, transform 0.1s;
  }
  .next-btn:hover { background: var(--accent); transform: translateY(-1px); }

  /* ATTEMPTS BADGE */
  .attempts-badge { font-size: 12px; color: var(--muted); margin-top: 8px; padding: 0 28px; display: none; }
  .attempts-badge.show { display: block; }

  /* RESULTS */
  .results { display: none; max-width: 680px; margin: 0 auto; animation: fadeUp 0.4s ease both; }
  .results.show { display: block; }
  .results-card { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 40px 28px; text-align: center; }
  .score-ring { width: 130px; height: 130px; margin: 0 auto 24px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg   { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Playfair Display', serif; font-size: 30px; color: var(--ink); }
  .results-title { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
  .results-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .divider { width: 40px; height: 3px; background: var(--gold); border-radius: 99px; margin: 0 auto 20px; }

  .review { text-align: left; margin-top: 24px; }
  .review-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .review-item:last-child { border-bottom: none; }
  .review-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .review-q { color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .review-ans { color: var(--ink); margin-top: 2px; }
  .review-tries { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .restart-btn { margin-top: 28px; width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .restart-btn:hover { background: var(--accent); }

  @media (max-width: 480px) {
    .card-body { padding: 20px 18px 10px; }
    .card-tag  { padding: 14px 18px; }
    .next-wrap { padding: 12px 18px 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">English Writing Skills</div>
  <h1>Paragraph Mastery</h1>
  <p>Units 5, 6 & 7 — Opinion, Cause-Effect, and Comparison paragraphs.</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Question 1 of 25</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="prog-fill" style="width:4%"></div>
  </div>
</div>

<div id="quiz-area"></div>

<div class="results" id="results-screen">
  <div class="results-card">
    <div class="score-ring">
      <svg viewBox="0 0 130 130" width="130" height="130">
        <circle class="ring-bg"   cx="65" cy="65" r="55"/>
        <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="55" stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="score-number" id="score-display">0/25</div>
    </div>
    <div class="divider"></div>
    <div class="results-title" id="results-title">Well done!</div>
    <div class="results-sub"   id="results-sub">Here's a summary of your answers.</div>
    <div class="review"        id="review-list"></div>
    <button class="restart-btn" onclick="restart()">Try Again ↺</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// QUESTION DATA
// ─────────────────────────────────────────────────────────────
const questions = [

// ── 1. TOPIC SENTENCE — Opinion ──────────────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this opinion paragraph.",
  body:"First, social media allows people to stay connected with friends and family anywhere in the world. A simple message or video call can bridge the distance between loved ones in different countries, making it far easier to maintain close relationships. In addition, it is an excellent source of news and information — platforms give users instant access to breaking stories, expert opinions, and educational content that would otherwise be hard to find. Furthermore, social media gives ordinary people a powerful platform to share their ideas and creativity with a large audience. Many successful artists, writers, and small business owners have built careers simply by sharing their work online. In conclusion, social media has become an important and largely positive part of everyday life for millions of people around the world.",
  options:[
    {text:"Many people use social media every day.", correct:false},
    {text:"I believe that social media has many positive effects on people's lives.", correct:true},
    {text:"Social media was invented in the early 2000s.", correct:false},
    {text:"Some people spend too much time on their phones.", correct:false},
  ],
  hints:[
    "This is a general fact, not an opinion. A topic sentence for an opinion paragraph must clearly state the writer's view — look for opinion language like <em>I believe</em> or <em>In my opinion</em>.",
    null,
    "This is a historical fact. It also doesn't connect to the supporting sentences, which are all about benefits. Your topic sentence must match what the paragraph discusses.",
    "This introduces a negative idea, but the paragraph only talks about positive effects. The topic sentence must match the direction of the whole paragraph.",
  ],
  explanation:"Option B is correct. <em>'I believe that'</em> is a clear opinion signal, and the controlling idea (positive effects of social media) is exactly what all three supporting sentences develop."
},

// ── 2. TOPIC SENTENCE — Cause ────────────────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this cause paragraph.",
  body:"One reason is the increasing cost of living. As rent and food prices rise, many people can no longer afford basic expenses, even when they are employed. Another cause is the lack of well-paying jobs — in many regions, available work is low-skilled and poorly paid, making it impossible to save money or plan for the future. Additionally, unexpected medical costs can quickly push a family into serious financial hardship; a single hospital visit without insurance can wipe out months of savings. Finally, a lack of access to quality education means that many people are unable to develop the skills needed for better-paying careers. In conclusion, poverty is a complex problem driven by economic, medical, and educational factors that often reinforce each other.",
  options:[
    {text:"Poverty is a serious problem in many countries.", correct:false},
    {text:"The government should do more to help people living in poverty.", correct:false},
    {text:"There are several reasons why many people fall into poverty.", correct:true},
    {text:"Poverty has many effects on families and communities.", correct:false},
  ],
  hints:[
    "This names the topic but doesn't signal that the paragraph will explain causes. A cause topic sentence needs words like <em>reasons</em>, <em>causes</em>, or <em>factors</em>.",
    "This is an opinion sentence — it says what should be done, not why something happens. Cause paragraphs explain reasons, not recommendations.",
    null,
    "Watch out — this signals an <em>effects</em> paragraph. But the supporting sentences explain causes (cost of living, jobs, medical costs). Your topic sentence must match what follows.",
  ],
  explanation:"Option C is correct. It names the topic (poverty) and uses <em>'several reasons why'</em> to signal a causes paragraph. Every supporting sentence then introduces one cause, using signal words like <em>one reason</em>, <em>another cause</em>."
},

// ── 3. TOPIC SENTENCE — Effect ───────────────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this effect paragraph.",
  body:"First of all, people who exercise regularly tend to have stronger hearts and lower blood pressure, which significantly reduces the risk of cardiovascular disease later in life. In addition, exercise releases chemicals in the brain called endorphins, which improve mood, reduce anxiety, and help people manage stress more effectively. Furthermore, active people often report sleeping better and having more energy throughout the day, allowing them to be more focused and productive at work or school. Finally, regular physical activity helps maintain a healthy weight and strengthens muscles and bones, reducing the risk of injury as people age. To sum up, the physical and mental benefits of regular exercise make it one of the most valuable habits a person can develop.",
  options:[
    {text:"Regular exercise has several important benefits for both the body and mind.", correct:true},
    {text:"There are many reasons why people should exercise more.", correct:false},
    {text:"Exercise is one of the most popular activities in the world.", correct:false},
    {text:"Many people do not exercise enough in modern life.", correct:false},
  ],
  hints:[
    null,
    "This sounds like a cause topic sentence — <em>'reasons why people should'</em> sets up causes or opinions, not effects. The supporting sentences describe what exercise does to the body — these are outcomes.",
    "This is a vague general fact with no controlling idea. It doesn't tell the reader what specific direction the paragraph will take.",
    "This introduces a problem, but the paragraph doesn't discuss the problem — it discusses the positive results of exercising. Topic sentences must match the paragraph's content.",
  ],
  explanation:"Option A is correct. <em>'Has several important benefits'</em> signals an effects paragraph — the paragraph will explain what exercise does. Each supporting sentence then gives one specific effect: heart health, mood improvement, better sleep."
},

// ── 4. TOPIC SENTENCE — Similarity ───────────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this similarity paragraph.",
  body:"Both cities are home to world-famous museums and art galleries that attract millions of visitors from around the globe every year. Similarly, they both have rich histories visible in their architecture — from ancient monuments and historic squares to grand palaces and ornate fountains that have stood for centuries. In the same way, both are known for their vibrant café cultures, where locals and tourists spend hours over coffee, good food, and lively conversation. Furthermore, both Paris and Rome have well-preserved historic city centres that make exploring on foot a genuine pleasure for visitors. In conclusion, whether you visit for the art, the history, or the atmosphere, Paris and Rome offer remarkably similar and equally rewarding experiences.",
  options:[
    {text:"Paris and Rome are two of the most visited cities in Europe.", correct:false},
    {text:"Paris and Rome are different in many ways.", correct:false},
    {text:"In my opinion, Paris is a more interesting city than Rome.", correct:false},
    {text:"Paris and Rome share many similarities as popular European destinations.", correct:true},
  ],
  hints:[
    "This is a fact about popularity — it doesn't signal that the paragraph will focus on similarities. A similarity topic sentence must show that two things are being compared as alike.",
    "This points to differences, but the paragraph discusses only similarities. Be careful: <em>different</em> vs <em>similar</em> completely change the paragraph's direction.",
    "This is a personal opinion, and it compares the two cities as unequal — but the paragraph treats them equally. Topic sentences must match the paragraph's purpose.",
    null,
  ],
  explanation:"Option D is correct. It names both subjects (Paris and Rome) and uses <em>'share many similarities'</em> to clearly signal a similarities paragraph. All three supporting sentences then develop a specific shared quality."
},

// ── 5. TOPIC SENTENCE — Contrast ─────────────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this contrast paragraph.",
  body:"First, high school students follow a timetable set by their school, while university students choose their own courses and build their own weekly schedules. In addition, high school teachers closely monitor student progress and regularly contact parents, whereas university students are expected to manage their own learning and seek help independently. Furthermore, the social environment differs greatly — high school students spend years with the same group of peers, while university students meet a far more diverse range of people from different cities and backgrounds. Finally, high school is free in most countries, but university requires tuition fees and careful financial planning. In conclusion, high school and university differ significantly in structure, independence, social experience, and cost.",
  options:[
    {text:"High school and university are both important stages of education.", correct:false},
    {text:"High school and university are different in several significant ways.", correct:true},
    {text:"University is clearly better than high school for most students.", correct:false},
    {text:"There are many reasons why students prefer university to high school.", correct:false},
  ],
  hints:[
    "<em>'Both'</em> signals a similarity, not a contrast. The paragraph only discusses differences between high school and university — your topic sentence must match.",
    null,
    "This is an opinion that argues one is better. But the paragraph doesn't take sides — it objectively contrasts two educational experiences. Don't confuse opinion with contrast.",
    "This reads like a cause topic sentence (<em>'reasons why'</em>). The paragraph doesn't explain preferences — it highlights differences. Match the topic sentence to what actually follows.",
  ],
  explanation:"Option B is correct. It introduces both subjects and uses <em>'different in several significant ways'</em> to signal a contrast paragraph. Each supporting sentence then highlights one difference, using <em>while</em>, <em>whereas</em>, and <em>but</em>."
},

// ── 6. TOPIC SENTENCE — Opinion (harder) ─────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this opinion paragraph.",
  body:"To begin with, remote work eliminates the stress of commuting, giving employees more time for family, exercise, and personal activities — which leads to a better overall work-life balance. Furthermore, people tend to work in a more comfortable and personalised environment at home, which can reduce distractions and boost creativity and concentration. In addition, companies can hire talented people from different cities or countries, increasing diversity and allowing organisations to find the best candidates regardless of location. Moreover, businesses can save money on office space and equipment, which can be reinvested into staff development or better technology. For all these reasons, it is clear that remote working offers significant and lasting advantages for both employees and the organisations they work for.",
  options:[
    {text:"Many companies now offer remote working options to their employees.", correct:false},
    {text:"Working from home has both advantages and disadvantages.", correct:false},
    {text:"In my opinion, working remotely is beneficial for both employees and companies.", correct:true},
    {text:"Some people find it difficult to stay motivated when working from home.", correct:false},
  ],
  hints:[
    "This is a factual observation about a trend. It doesn't take a position or tell the reader what the paragraph will argue. An opinion topic sentence must state the writer's view clearly.",
    "This promises to discuss both sides, but the paragraph only presents benefits — no disadvantages are mentioned. Your topic sentence must match what actually follows.",
    null,
    "This introduces a negative point (difficulty staying motivated) that completely contradicts the paragraph's positive content. A topic sentence controls the whole paragraph — they must match.",
  ],
  explanation:"Option C is correct. <em>'In my opinion'</em> signals an opinion paragraph clearly, and <em>'beneficial for both employees and companies'</em> is the controlling idea. Each supporting sentence then explains a specific benefit for one or both groups."
},

// ── 7. ODD ONE OUT — Opinion ──────────────────────────────────
{
  type:"odd", typeLabel:"Odd One Out", typeClass:"tag-ooo",
  instruction:"Click on the sentence that <strong>does NOT belong</strong> in this opinion paragraph about learning a second language.",
  sentences:[
    {text:"1. Learning a second language opens up more career opportunities in international companies.", correct:false, hint:"This directly supports the idea that learning a language is beneficial — it belongs in the paragraph."},
    {text:"2. It also helps people understand different cultures and become more open-minded.", correct:false, hint:"This is a clear supporting sentence about a personal benefit of language learning. It fits the main idea well."},
    {text:"3. Grammar rules are often considered the most difficult part of language learning.", correct:true, hint:"The other sentences all explain a specific <em>benefit</em> of learning a second language. Does this sentence describe a benefit, or does it talk about something else entirely?"},
    {text:"4. In addition, being bilingual has been shown to improve memory and concentration.", correct:false, hint:"This gives a cognitive benefit of language learning. It supports the main idea."},
    {text:"5. Overall, learning a new language enriches your personal and professional life.", correct:false, hint:"This is a concluding sentence that wraps up the benefits. It belongs in the paragraph."},
  ],
  explanation:"Sentence 3 is the odd one out. It mentions a difficulty (grammar rules) — but the paragraph's main idea is the <em>benefits</em> of learning a second language. Sentences 1, 2, 4, and 5 each explain a clear benefit: career opportunities, cultural understanding, cognitive improvement, and personal growth. Sentence 3 doesn't support any of these — it shifts to a completely different angle."
},

// ── 8. ODD ONE OUT — Cause ───────────────────────────────────
{
  type:"odd", typeLabel:"Odd One Out", typeClass:"tag-ooo",
  instruction:"Click on the sentence that <strong>does NOT belong</strong> in this cause paragraph about stress in university students.",
  sentences:[
    {text:"1. One reason is the pressure of exams and deadlines, which can feel overwhelming.", correct:false, hint:"This clearly identifies a cause of student stress. It belongs in the paragraph."},
    {text:"2. Another cause is financial difficulty, as many students struggle to pay for tuition and living costs.", correct:false, hint:"Financial difficulty is presented as a cause of stress. It fits the paragraph perfectly."},
    {text:"3. Universities should provide more mental health support for their students.", correct:true, hint:"Think carefully: does this sentence explain a <em>cause</em> of stress, or does it suggest a solution to it?"},

let current = 0, score = 0;
let userAnswers = [];      // {correct, firstTry, label}
let hintedThisQ = false;   // did we show a hint before answering?

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function renderQuestion() {
  hintedThisQ = false;
  const q = questions[current];
  const area = document.getElementById("quiz-area");
  area.innerHTML = "";

  document.getElementById("prog-label").textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById("score-label").textContent = `Score: ${score}`;
  document.getElementById("prog-fill").style.width = `${((current+1)/questions.length)*100}%`;

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-tag">
      <span class="tag-pill ${q.typeClass}">${q.typeLabel}</span>
    </div>
    <div class="card-body">
      <p class="question-text">${q.instruction}</p>
      ${q.body ? `<div class="para-box">${q.body}</div>` : ""}
      <div id="interaction-area"></div>
      <div class="hint-box" id="hint-box"></div>
      <div class="show-why-wrap" id="show-why-wrap">
        <button class="show-why-btn" id="show-why-btn">Show me why →</button>
      </div>
      <div class="feedback" id="feedback-box"></div>
    </div>
  `;
  area.appendChild(card);

  const nextWrap = document.createElement("div");
  nextWrap.className = "next-wrap";
  nextWrap.id = "next-wrap";
  const isLast = current === questions.length - 1;
  nextWrap.innerHTML = `<button class="next-btn" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">${isLast ? "See Results →" : "Next Question →"}</button>`;
  card.appendChild(nextWrap);

  if (q.type === "odd") buildOdd(q);
  else buildMC(q);
}

// ─── MULTIPLE CHOICE ──────────────────────────────────────────
function buildMC(q) {
  const ia = document.getElementById("interaction-area");
  const letters = ["A","B","C","D"];
  const div = document.createElement("div");
  div.className = "options";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => handleMC(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleMC(q, idx, container) {
  const btns = container.querySelectorAll(".option-btn");
  const isCorrect = q.options[idx].correct;

  if (isCorrect) {
    // correct on first try (no hint shown) or after hint
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    // highlight correct (same)
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.options[idx].text.substring(0,60)});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    // wrong
    hintedThisQ = true;
    btns[idx].classList.add("state-hinted");
    btns[idx].disabled = true;

    // show distractor hint
    const hintText = q.hints[idx];
    const hintBox = document.getElementById("hint-box");
    hintBox.innerHTML = `<div class="hint-label">💡 Hint</div>${hintText}`;
    hintBox.classList.add("show");

    // show "show me why" button
    const showWrap = document.getElementById("show-why-wrap");
    showWrap.classList.add("show");
    document.getElementById("show-why-btn").onclick = () => revealMC(q, idx, container);
  }
}

function revealMC(q, clickedIdx, container) {
  const btns = container.querySelectorAll(".option-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (q.options[i].correct) b.classList.add("state-reveal-correct");
    else if (i === clickedIdx) b.classList.add("state-wrong");
  });
  document.getElementById("show-why-wrap").classList.remove("show");
  showFeedback(false, q.explanation);
  userAnswers.push({correct:false, firstTry:false, label: q.options[clickedIdx].text.substring(0,60)});
  document.getElementById("next-wrap").classList.add("show");
}

// ─── ODD ONE OUT ──────────────────────────────────────────────
function buildOdd(q) {
  const ia = document.getElementById("interaction-area");
  const div = document.createElement("div");
  div.className = "sentences";
  q.sentences.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "sentence-btn";
    btn.innerHTML = s.text;
    btn.dataset.idx = i;
    btn.onclick = () => handleOdd(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleOdd(q, idx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  const isCorrect = q.sentences[idx].correct;

  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.sentences[idx].text.substring(0,60)});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    hintedThisQ = true;
    btns[idx].classList.add("state-hinted");
    btns[idx].disabled = true;

    const hintText = q.sentences[idx].hint;
    const hintBox = document.getElementById("hint-box");
    hintBox.innerHTML = `<div class="hint-label">💡 Hint</div>${hintText}`;
    hintBox.classList.add("show");

    const showWrap = document.getElementById("show-why-wrap");
    showWrap.classList.add("show");
    document.getElementById("show-why-btn").onclick = () => revealOdd(q, idx, container);
  }
}

function revealOdd(q, clickedIdx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (q.sentences[i].correct) b.classList.add("state-reveal-correct");
    else if (i === clickedIdx) b.classList.add("state-reveal-wrong");
  });
  document.getElementById("show-why-wrap").classList.remove("show");
  showFeedback(false, q.explanation);
  userAnswers.push({correct:false, firstTry:false, label: q.sentences[clickedIdx].text.substring(0,60)});
  document.getElementById("next-wrap").classList.add("show");
}

// ─── FEEDBACK ─────────────────────────────────────────────────
function showFeedback(isCorrect, explanation) {
  const box = document.getElementById("feedback-box");
  const hintBox = document.getElementById("hint-box");
  hintBox.classList.remove("show"); // hide hint when full explanation shows
  document.getElementById("show-why-wrap").classList.remove("show");
  box.className = `feedback show ${isCorrect ? "fb-correct" : "fb-wrong"}`;
  box.innerHTML = (isCorrect ? "<strong>✓ Correct!</strong> " : "<strong>Here's why:</strong> ") + explanation;
}

// ─── NAVIGATION ───────────────────────────────────────────────
function nextQuestion() {
  current++;
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

// ─── RESULTS ──────────────────────────────────────────────────
function showResults() {
  document.getElementById("quiz-area").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";
  const screen = document.getElementById("results-screen");
  screen.classList.add("show");

  const pct = score / questions.length;
  const circumference = 345.4;
  setTimeout(() => {
    document.getElementById("ring-fill").style.strokeDashoffset = circumference - pct * circumference;
  }, 100);

  document.getElementById("score-display").textContent = `${score}/${questions.length}`;

  let title, sub;
  if (pct === 1)        { title = "Perfect score! 🎉"; sub = "Outstanding — you've mastered every concept!"; }
  else if (pct >= 0.88) { title = "Excellent work! ✨"; sub = "You have a strong command of paragraph structure."; }
  else if (pct >= 0.72) { title = "Well done! 👍"; sub = "Solid understanding — review the questions you found tricky."; }
  else if (pct >= 0.56) { title = "Good effort! 📝"; sub = "You're on the right track. Try again to improve your score."; }
  else                  { title = "Keep practising! 📚"; sub = "Every mistake is a learning moment. Give it another go!"; }

  document.getElementById("results-title").textContent = title;
  document.getElementById("results-sub").textContent   = sub;

  const reviewList = document.getElementById("review-list");
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const div = document.createElement("div");
    div.className = "review-item";
    const icon = !ua ? "⬜" : (ua.correct && ua.firstTry ? "✅" : ua.correct ? "✅" : "❌");
    const triesNote = ua && ua.correct && !ua.firstTry ? " (needed a hint)" : ua && !ua.correct ? " (shown answer)" : "";
    div.innerHTML = `
      <span class="review-icon">${icon}</span>
      <div>
        <div class="review-q">Q${i+1} · ${q.typeLabel}</div>
        <div class="review-ans">${ua ? ua.label + "…" : "Not answered"}</div>
        ${triesNote ? `<div class="review-tries">${triesNote}</div>` : ""}
      </div>`;
    reviewList.appendChild(div);
  });

  window.scrollTo({top:0, behavior:"smooth"});
}

function restart() {
  current = 0; score = 0; userAnswers = [];
  document.getElementById("results-screen").classList.remove("show");
  document.getElementById("quiz-area").style.display = "";
  document.querySelector(".progress-wrap").style.display = "";
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

// kick off
renderQuestion();
</script>
</body>

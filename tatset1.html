<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paragraph Skills Practice – Set 1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #1a1a2e;
    --muted: #6b6b80;
    --accent: #2d6a6a;
    --accent-light: #e0f0f0;
    --gold: #c6963a;
    --gold-light: #fdf3de;
    --correct: #2d7a4a;
    --correct-bg: #e8f7ee;
    --wrong: #b33030;
    --wrong-bg: #fdecea;
    --hint-bg: #fffbea;
    --hint-border: #f0c040;
    --hint-text: #7a5c00;
    --border: #e4ddd4;
    --shadow: 0 4px 24px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--ink);
    padding: 0 16px 60px;
  }

  /* HEADER */
  .header { text-align: center; padding: 48px 16px 32px; }
  .header .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,42px); color: var(--ink); line-height: 1.2; }
  .header p { margin-top: 10px; color: var(--muted); font-size: 15px; max-width: 520px; margin-left: auto; margin-right: auto; }

  /* PROGRESS */
  .progress-wrap { max-width: 680px; margin: 0 auto 32px; padding: 0 8px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .progress-bar-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  /* CARD */
  .card { max-width: 680px; margin: 0 auto; background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .card-tag { display: flex; align-items: center; gap: 10px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: #fafafa; }
  .tag-pill { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; }
  .tag-ts  { background: #dbeafe; color: #1e40af; }
  .tag-ooo { background: #fce7f3; color: #9d174d; }
  .tag-cs  { background: #d1fae5; color: #065f46; }
  .tag-ps  { background: #ede9fe; color: #5b21b6; }
  .tag-sw  { background: #fff3cd; color: #92400e; }
  .tag-fo  { background: #fee2e2; color: #991b1b; }
  .tag-ss  { background: #e0f2fe; color: #075985; }

  .card-body { padding: 28px 28px 10px; }
  .question-text { font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--ink); margin-bottom: 22px; }
  .para-box { background: var(--bg); border-left: 4px solid var(--gold); border-radius: 0 10px 10px 0; padding: 16px 20px; font-size: 14.5px; line-height: 1.8; color: #333; margin-bottom: 22px; font-style: italic; }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn {
    display: flex; align-items: flex-start; gap: 12px;
    width: 100%; text-align: left;
    padding: 14px 18px;
    border: 2px solid var(--border); border-radius: 12px;
    background: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14.5px; line-height: 1.55; color: var(--ink);
    cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.1s;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); transform: translateX(3px); }
  .option-btn:disabled { cursor: default; }
  .option-btn.state-correct  { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .option-btn.state-wrong    { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .option-btn.state-hinted   { border-color: var(--hint-border); background: var(--hint-bg); }
  .option-btn.state-reveal-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }

  .opt-letter {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; flex-shrink: 0; margin-top: 1px;
    border-radius: 50%; background: var(--border);
    font-size: 12px; font-weight: 700;
    transition: background 0.2s, color 0.2s;
  }
  .option-btn.state-correct .opt-letter,
  .option-btn.state-reveal-correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.state-wrong .opt-letter    { background: var(--wrong); color: #fff; }
  .option-btn.state-hinted .opt-letter   { background: var(--hint-border); color: #fff; }

  /* ODD ONE OUT */
  .sentences { display: flex; flex-direction: column; gap: 10px; }
  .sentence-btn {
    width: 100%; text-align: left;
    padding: 13px 18px; border: 2px solid var(--border); border-radius: 12px;
    background: #fff;
    font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.65; color: var(--ink);
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
  }
  .sentence-btn:hover:not(:disabled) { border-color: #9d174d; background: #fce7f3; }
  .sentence-btn:disabled { cursor: default; }
  .sentence-btn.state-correct        { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-hinted         { border-color: var(--hint-border); background: var(--hint-bg); }
  .sentence-btn.state-reveal-correct { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-reveal-wrong   { border-color: var(--border); opacity: 0.6; }

  /* HINT BOX */
  .hint-box {
    display: none; margin-top: 14px;
    padding: 12px 16px; border-radius: 10px;
    background: var(--hint-bg); border: 1px solid var(--hint-border);
    font-size: 13.5px; line-height: 1.6; color: var(--hint-text);
  }
  .hint-box.show { display: block; animation: fadeUp 0.25s ease both; }
  .hint-box strong { font-weight: 700; }
  .hint-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--hint-border); margin-bottom: 5px; }

  /* SHOW ME WHY BUTTON */
  .show-why-wrap { display: none; margin-top: 10px; }
  .show-why-wrap.show { display: block; }
  .show-why-btn {
    background: none; border: 2px solid var(--ink); border-radius: 10px;
    padding: 9px 18px;
    font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600; color: var(--ink);
    cursor: pointer; transition: background 0.2s, color 0.2s;
  }
  .show-why-btn:hover { background: var(--ink); color: #fff; }

  /* FEEDBACK */
  .feedback { display: none; margin-top: 14px; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .feedback.show { display: block; animation: fadeUp 0.3s ease both; }
  .feedback.fb-correct { background: var(--correct-bg); color: #065f46; border: 1px solid #a7f3d0; }
  .feedback.fb-wrong   { background: #f0f4ff; color: #1e3a8a; border: 1px solid #bfdbfe; }

  /* NEXT BUTTON */
  .next-wrap { padding: 14px 28px 28px; display: none; }
  .next-wrap.show { display: block; }
  .next-btn {
    width: 100%; padding: 14px;
    background: var(--ink); color: #fff; border: none; border-radius: 12px;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; letter-spacing: 0.3px; transition: background 0.2s, transform 0.1s;
  }
  .next-btn:hover { background: var(--accent); transform: translateY(-1px); }

  /* ATTEMPTS BADGE */
  .attempts-badge { font-size: 12px; color: var(--muted); margin-top: 8px; padding: 0 28px; display: none; }
  .attempts-badge.show { display: block; }

  /* RESULTS */
  .results { display: none; max-width: 680px; margin: 0 auto; animation: fadeUp 0.4s ease both; }
  .results.show { display: block; }
  .results-card { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 40px 28px; text-align: center; }
  .score-ring { width: 130px; height: 130px; margin: 0 auto 24px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg   { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Playfair Display', serif; font-size: 30px; color: var(--ink); }
  .results-title { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
  .results-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .divider { width: 40px; height: 3px; background: var(--gold); border-radius: 99px; margin: 0 auto 20px; }

  .review { text-align: left; margin-top: 24px; }
  .review-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .review-item:last-child { border-bottom: none; }
  .review-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .review-q { color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .review-ans { color: var(--ink); margin-top: 2px; }
  .review-tries { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .restart-btn { margin-top: 28px; width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .restart-btn:hover { background: var(--accent); }

  /* SECTION LABELS */
  .section-sep { display: flex; align-items: center; gap: 12px; margin: 28px 0 16px; }
  .section-sep-line { flex: 1; height: 1px; background: var(--border); }
  .section-sep-label { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); white-space: nowrap; }

  /* PATTERN CARDS */
  .pattern-card { background: var(--hint-bg); border: 1px solid var(--hint-border); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; text-align: left; }
  .pattern-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .pattern-card-icon { font-size: 15px; }
  .pattern-card-type { font-size: 12px; font-weight: 700; color: var(--hint-text); letter-spacing: 0.3px; }
  .pattern-card-count { font-size: 11px; font-weight: 600; background: var(--hint-border); color: #fff; border-radius: 99px; padding: 1px 8px; }
  .pattern-card-tip { font-size: 13px; line-height: 1.65; color: var(--hint-text); }

  /* WRONG REVIEW CARDS */
  .wrong-card { background: #f5f7ff; border: 1px solid #c7d2fe; border-radius: 14px; padding: 18px; margin-bottom: 14px; text-align: left; }
  .wrong-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .wrong-card-qnum { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }
  .wrong-card-block { margin-bottom: 10px; }
  .wrong-card-block:last-child { margin-bottom: 0; }
  .wrong-block-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px; }
  .lbl-chose { color: var(--wrong); }
  .lbl-hint  { color: var(--hint-text); }
  .lbl-expl  { color: var(--correct); }
  .wrong-block-text { font-size: 13.5px; line-height: 1.6; border-radius: 8px; padding: 9px 12px; }
  .txt-chose { background: var(--wrong-bg); color: #7f1d1d; }
  .txt-hint  { background: var(--hint-bg); color: var(--hint-text); border: 1px solid var(--hint-border); }
  .txt-expl  { background: var(--correct-bg); color: #064e3b; }

  @media (max-width: 480px) {
    .card-body { padding: 20px 18px 10px; }
    .card-tag  { padding: 14px 18px; }
    .next-wrap { padding: 12px 18px 22px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">English Writing Skills</div>
  <h1>Paragraph Mastery</h1>
  <p>Units 6, 7 &amp; 8: Cause-Effect, Comparison, and Problem-Solution paragraphs.</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Question 1 of 25</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="prog-fill" style="width:3%"></div>
  </div>
</div>

<div id="quiz-area"></div>

<div class="results" id="results-screen">
  <div class="results-card">
    <div class="score-ring">
      <svg viewBox="0 0 130 130" width="130" height="130">
        <circle class="ring-bg"   cx="65" cy="65" r="55"/>
        <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="55" stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="score-number" id="score-display">0/33</div>
    </div>
    <div class="divider"></div>
    <div class="results-title" id="results-title">Well done!</div>
    <div class="results-sub"   id="results-sub">Here's a summary of your answers.</div>

    <!-- Pattern analysis (hidden if perfect score) -->
    <div id="pattern-section"></div>

    <!-- Quick review list -->
    <div class="review" id="review-list"></div>

    <!-- Detailed wrong cards -->
    <div id="wrong-section"></div>

    <button class="restart-btn" onclick="restart()">Try Again &#8635;</button>
  </div>
</div>

<script>
// -----------------------------------------------------------------
// QUESTION DATA
// -----------------------------------------------------------------
const questions = [

// == 1. TOPIC SENTENCE, Cause =====================================
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this cause paragraph.",
  body:"One reason is the growing number of private cars on the road. As more people buy vehicles, streets become increasingly crowded and traffic slows down significantly. Another cause is the lack of reliable public transport: in cities where buses and trains are irregular or overcrowded, many commuters choose to drive instead. Additionally, road accidents and construction work can suddenly block lanes, reducing traffic flow and creating long delays. Finally, poor road planning in older city centres means that streets are simply too narrow to handle the volume of vehicles that use them today. In conclusion, traffic jams are the result of a combination of increasing car ownership, weak public transport, and inadequate road infrastructure.",
  options:[
    {text:"Traffic jams are a common and frustrating daily experience in cities around the world.", correct:false},
    {text:"There are several important causes of traffic jams in modern cities.", correct:true},
    {text:"Traffic jams have many negative effects on the environment and people's health.", correct:false},
    {text:"Governments should invest in public transport to solve the traffic problem.", correct:false},
  ],
  hints:[
    "This introduces the topic but gives no signal that the paragraph will focus on reasons. A cause topic sentence needs clear language like <em>reasons</em>, <em>causes</em>, or <em>factors</em>.",
    null,
    "This signals an <em>effects</em> paragraph. But every supporting sentence explains a <em>reason</em> for traffic jams, not a consequence. Your topic sentence must match what follows.",
    "This gives a recommendation about what should be done. A cause paragraph explains <em>why</em> something happens, not what someone should do about it.",
  ],
  explanation:"Option B is correct. It names the topic (traffic jams) and uses <em>'several important causes'</em> to signal clearly that the paragraph will explain reasons. Each supporting sentence then introduces one cause: car ownership, weak public transport, accidents, and poor road design."
},

// == 2. TOPIC SENTENCE, Effect ====================================
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this effect paragraph.",
  body:"First, it helps make muscles and joints more flexible, which lowers the chance of getting hurt during daily activities. It also builds strength throughout the body, especially in the core, arms, and legs. In addition, yoga has significant benefits for mental health: regular practice helps people relax, manage stress, and develop a calmer, more focused mind. Furthermore, it can improve posture by strengthening the muscles that support the spine, reducing back pain and discomfort. It also helps people sleep better and feel more energetic throughout the day. Overall, yoga is one of the most complete forms of exercise for improving both physical and mental wellbeing.",
  options:[
    {text:"Many people around the world practise yoga as part of their daily fitness routine.", correct:false},
    {text:"There are several reasons why people choose to practise yoga regularly.", correct:false},
    {text:"Yoga has many beneficial effects on the body and the mind.", correct:true},
    {text:"I believe that yoga is the most effective form of exercise for reducing stress.", correct:false},
  ],
  hints:[
    "This is a general factual statement about yoga's popularity. It doesn't signal that the paragraph will describe what yoga <em>does</em> for the body and mind. A topic sentence for an effects paragraph needs words like <em>effects</em>, <em>benefits</em>, or <em>consequences</em>.",
    "<em>Reasons why people choose</em> is a cause signal: it suggests the paragraph will explain motivations. But the supporting sentences describe physical and mental <em>outcomes</em>, not reasons. Read what follows and match accordingly.",
    null,
    "<em>I believe</em> signals an opinion paragraph. An effects paragraph focuses on factual outcomes, not personal beliefs. Note also that the supporting sentences describe multiple effects without expressing a personal view.",
  ],
  explanation:"Option C is correct. <em>'Many beneficial effects'</em> clearly signals an effects paragraph. Each supporting sentence then introduces one specific benefit: flexibility, strength, stress reduction, posture, and better sleep."
},

// == 3. TOPIC SENTENCE, Similarity ================================
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this similarity paragraph.",
  body:"Both platforms allow users to post photos and videos and build a personal following. Similarly, both apps use recommendation algorithms that learn from user behaviour and show personalised content based on individual interests. In addition, both are widely used by brands and content creators to advertise products and reach large audiences through sponsored posts. Furthermore, both offer interactive features such as comments, likes, and direct messaging, making it easy for users to connect and engage with each other. All in all, despite their different origins, Instagram and TikTok function in very similar ways and serve similar purposes for their users.",
  options:[
    {text:"Instagram and TikTok are two of the most popular social media apps in the world today.", correct:false},
    {text:"Instagram focuses on photos while TikTok is designed mainly for short videos.", correct:false},
    {text:"Instagram and TikTok share many important features and functions as social media platforms.", correct:true},
    {text:"Social media platforms like Instagram and TikTok have changed how people communicate online.", correct:false},
  ],
  hints:[
    "This is a general fact about both apps' popularity. It doesn't signal that the paragraph will focus on what they have in <em>common</em>. A similarity topic sentence needs words like <em>share</em>, <em>similar</em>, <em>alike</em>, or <em>in common</em>.",
    "This highlights a <em>difference</em>, which contradicts the paragraph's purpose. Every supporting sentence uses similarity signal words (<em>both, similarly, furthermore</em>) to describe shared features. Don't use a contrast sentence to open a similarities paragraph.",
    null,
    "This is a broad general statement about social media's effect on communication. It doesn't signal that the paragraph will specifically compare the two platforms or focus on their similarities.",
  ],
  explanation:"Option C is correct. It names both subjects and uses <em>'share many important features'</em> to signal a similarities paragraph. Each supporting sentence then develops one shared quality: content types, algorithms, brand use, and interactive features."
},

// == 4. TOPIC SENTENCE, Contrast ==================================
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this contrast paragraph.",
  body:"In autumn, temperatures gradually drop and days grow shorter, while spring brings warming weather and increasing daylight. The natural environment also looks very different: autumn is the season of falling leaves and muted orange and red tones, whereas spring is marked by blooming flowers and fresh green growth. Furthermore, many animals become less active or begin hibernating in autumn, while in spring they emerge, breed, and fill the landscape with life. Finally, the mood associated with each season differs: autumn is often linked to endings and preparation for winter, while spring symbolises renewal, energy, and new beginnings. In conclusion, although both are transitional seasons, autumn and spring offer entirely opposite experiences of nature, light, and atmosphere.",
  options:[
    {text:"Autumn and spring are both beautiful transitional seasons between summer and winter.", correct:false},
    {text:"There are several reasons why many people prefer spring to autumn.", correct:false},
    {text:"Autumn and spring are very different in terms of weather, nature, and atmosphere.", correct:true},
    {text:"Autumn and spring both have an important role in the changing of the seasons each year.", correct:false},
  ],
  hints:[
    "<em>Both</em> signals a similarity. But the paragraph uses contrast language throughout: <em>while, whereas, differs</em>. Opening with a similarity sentence completely misrepresents the paragraph's purpose.",
    "This reads like a cause or opinion sentence: it introduces a comparison of preferences rather than a clear contrast. The paragraph doesn't discuss why people prefer one season; it objectively describes how they are different.",
    null,
    "<em>Both have an important role</em> is a similarity statement. Every supporting sentence in the paragraph highlights a <em>difference</em>. A contrast paragraph needs a topic sentence that signals differences, not shared qualities.",
  ],
  explanation:"Option C is correct. It names both subjects and uses <em>'very different in terms of'</em> to clearly signal a contrast paragraph. Each supporting sentence then develops one key difference using contrast signal words like <em>while</em>, <em>whereas</em>, and <em>differs</em>."
},

// == 5. TOPIC SENTENCE, Problem-Solution ==========================
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this problem-solution paragraph.",
  body:"Many young people scroll through social media, watch videos, or play games for several hours a day, which affects their sleep, concentration, and physical health. One solution is to set daily screen time limits using built-in phone settings, so users become more aware of how they spend their time online. Another effective approach is to create phone-free zones at home, such as during meals or in the bedroom before sleep. Additionally, finding offline hobbies like reading, sports, or creative activities can naturally reduce the time spent on devices. By combining these strategies, young people can develop a healthier and more balanced relationship with technology.",
  options:[
    {text:"Many young people enjoy using social media and smartphones to connect with friends online.", correct:false},
    {text:"There are several reasons why young people spend so much time on their phones.", correct:false},
    {text:"Spending too much time on phones is becoming a serious problem for many young people today.", correct:true},
    {text:"Social media and smartphones have many positive effects on young people's social lives.", correct:false},
  ],
  hints:[
    "This presents phone use positively, as a normal and beneficial activity. A problem-solution topic sentence must clearly identify a <em>problem</em> so the reader is prepared for the solutions that follow.",
    "<em>Several reasons</em> signals a cause paragraph. The supporting sentences don't explain why young people use phones; they offer <em>solutions</em> to excessive phone use. Match the signal to the content.",
    null,
    "This sounds like the opening of a positive effects paragraph. But the supporting sentences all offer solutions to a problem, not a list of benefits. The topic sentence must signal a <em>problem</em>, not a positive outcome.",
  ],
  explanation:"Option C is correct. It clearly states the problem (too much screen time) and frames it as <em>serious</em>, preparing the reader for solutions. Each supporting sentence then offers one specific solution: screen time limits, phone-free zones, and offline hobbies."
},

// == 6. TOPIC SENTENCE, Problem-Solution ==========================
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this problem-solution paragraph.",

// -----------------------------------------------------------------
// PARA TYPES (maps question index to paragraph type)
// -----------------------------------------------------------------
const paraTypes = [
  'cause','effect','similarity','contrast','problem-solution','problem-solution', // Q1-6  Topic Sentence
  'cause','effect','similarity','contrast','problem-solution',                    // Q7-11 Odd One Out
  'cause','effect','similarity','contrast','problem-solution',                    // Q12-16 Concluding
  'cause','effect','similarity','contrast',                                       // Q17-20 Signal Words
  'cause','problem-solution','contrast',                                          // Q21-23 Paragraph Type
  'cause','effect','similarity','contrast','cause','effect','similarity','contrast','problem-solution','problem-solution' // Q24-33 Supporting
];

// -----------------------------------------------------------------
// STATE
// -----------------------------------------------------------------
let current = 0, score = 0;
let userAnswers = [];
let hintedThisQ  = false;
let firstWrongIdx = -1;

// -----------------------------------------------------------------
// RENDER
// -----------------------------------------------------------------
function renderQuestion() {
  hintedThisQ   = false;
  firstWrongIdx = -1;
  const q = questions[current];
  const area = document.getElementById("quiz-area");
  area.innerHTML = "";

  document.getElementById("prog-label").textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById("score-label").textContent = `Score: ${score}`;
  document.getElementById("prog-fill").style.width = `${((current+1)/questions.length)*100}%`;

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <div class="card-tag">
      <span class="tag-pill ${q.typeClass}">${q.typeLabel}</span>
    </div>
    <div class="card-body">
      <p class="question-text">${q.instruction}</p>
      ${q.body ? `<div class="para-box">${q.body}</div>` : ""}
      <div id="interaction-area"></div>
      <div class="hint-box" id="hint-box"></div>
      <div class="show-why-wrap" id="show-why-wrap">
        <button class="show-why-btn" id="show-why-btn">Show me why &rarr;</button>
      </div>
      <div class="feedback" id="feedback-box"></div>
    </div>
  `;
  area.appendChild(card);

  const nextWrap = document.createElement("div");
  nextWrap.className = "next-wrap";
  nextWrap.id = "next-wrap";
  const isLast = current === questions.length - 1;
  nextWrap.innerHTML = `<button class="next-btn" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">
    ${isLast ? "See Results &rarr;" : "Next Question &rarr;"}
  </button>`;
  card.appendChild(nextWrap);

  if (q.type === "odd") buildOdd(q);
  else buildMC(q);
}

// -- MULTIPLE CHOICE -----------------------------------------------
function buildMC(q) {
  const ia = document.getElementById("interaction-area");
  const letters = ["A","B","C","D"];
  const div = document.createElement("div");
  div.className = "options";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => handleMC(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleMC(q, idx, container) {
  const btns = container.querySelectorAll(".option-btn");
  const isCorrect = q.options[idx].correct;

  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.options[idx].text.substring(0,60), wrongIdx: firstWrongIdx});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    if (firstWrongIdx === -1) firstWrongIdx = idx;
    hintedThisQ = true;
    btns[idx].classList.add("state-hinted");
    btns[idx].disabled = true;

    const hintText = q.hints[idx];
    const hintBox = document.getElementById("hint-box");
    hintBox.innerHTML = `<div class="hint-label">&#128161; Hint</div>${hintText}`;
    hintBox.classList.add("show");

    const showWrap = document.getElementById("show-why-wrap");
    showWrap.classList.add("show");
    document.getElementById("show-why-btn").onclick = () => revealMC(q, idx, container);
  }
}

function revealMC(q, clickedIdx, container) {
  const btns = container.querySelectorAll(".option-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (q.options[i].correct) b.classList.add("state-reveal-correct");
    else if (i === clickedIdx) b.classList.add("state-wrong");
  });
  document.getElementById("show-why-wrap").classList.remove("show");
  showFeedback(false, q.explanation);
  userAnswers.push({correct:false, firstTry:false, label: q.options[clickedIdx].text.substring(0,60), wrongIdx: firstWrongIdx !== -1 ? firstWrongIdx : clickedIdx});
  document.getElementById("next-wrap").classList.add("show");
}

// -- ODD ONE OUT ---------------------------------------------------
function buildOdd(q) {
  const ia = document.getElementById("interaction-area");
  const div = document.createElement("div");
  div.className = "sentences";
  q.sentences.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "sentence-btn";
    btn.innerHTML = s.text;
    btn.dataset.idx = i;
    btn.onclick = () => handleOdd(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleOdd(q, idx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  const isCorrect = q.sentences[idx].correct;

  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.sentences[idx].text.substring(0,60), wrongIdx: firstWrongIdx});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    if (firstWrongIdx === -1) firstWrongIdx = idx;
    hintedThisQ = true;
    btns[idx].classList.add("state-hinted");
    btns[idx].disabled = true;

    const hintText = q.sentences[idx].hint;
    const hintBox = document.getElementById("hint-box");
    hintBox.innerHTML = `<div class="hint-label">&#128161; Hint</div>${hintText}`;
    hintBox.classList.add("show");

    const showWrap = document.getElementById("show-why-wrap");
    showWrap.classList.add("show");
    document.getElementById("show-why-btn").onclick = () => revealOdd(q, idx, container);
  }
}

function revealOdd(q, clickedIdx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (q.sentences[i].correct) b.classList.add("state-reveal-correct");
    else if (i === clickedIdx) b.classList.add("state-reveal-wrong");
  });
  document.getElementById("show-why-wrap").classList.remove("show");
  showFeedback(false, q.explanation);
  userAnswers.push({correct:false, firstTry:false, label: q.sentences[clickedIdx].text.substring(0,60), wrongIdx: firstWrongIdx !== -1 ? firstWrongIdx : clickedIdx});
  document.getElementById("next-wrap").classList.add("show");
}

// -- FEEDBACK ------------------------------------------------------
function showFeedback(isCorrect, explanation) {
  const box = document.getElementById("feedback-box");
  const hintBox = document.getElementById("hint-box");
  hintBox.classList.remove("show");
  document.getElementById("show-why-wrap").classList.remove("show");
  box.className = `feedback show ${isCorrect ? "fb-correct" : "fb-wrong"}`;
  box.innerHTML = (isCorrect ? "<strong>&#10003; Correct!</strong> " : "<strong>Here's why:</strong> ") + explanation;
}

// -- NAVIGATION ----------------------------------------------------
function nextQuestion() {
  current++;
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

// -- RESULTS -------------------------------------------------------
function showResults() {
  document.getElementById("quiz-area").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";
  const screen = document.getElementById("results-screen");
  screen.classList.add("show");

  const pct = score / questions.length;
  const circumference = 345.4;
  setTimeout(() => {
    document.getElementById("ring-fill").style.strokeDashoffset = circumference - pct * circumference;
  }, 100);

  document.getElementById("score-display").textContent = `${score}/${questions.length}`;

  let title, sub;
  if (pct === 1)        { title = "Perfect score! &#127881;"; sub = "Outstanding, you've mastered every concept!"; }
  else if (pct >= 0.88) { title = "Excellent work! &#10024;"; sub = "You have a strong command of paragraph structure."; }
  else if (pct >= 0.72) { title = "Well done! &#128077;"; sub = "Solid understanding, review the sections below."; }
  else if (pct >= 0.56) { title = "Good effort! &#128221;"; sub = "You're on the right track. Study the feedback below."; }
  else                  { title = "Keep practising! &#128218;"; sub = "Every mistake is a learning moment. Read the feedback carefully."; }

  document.getElementById("results-title").innerHTML = title;
  document.getElementById("results-sub").textContent = sub;

  // Collect imperfect answers (needed hint OR shown answer)
  const needsReview = [];
  userAnswers.forEach((ua, i) => {
    if (!ua.firstTry) needsReview.push({qIdx: i, ua});
  });

  // -- PATTERN ANALYSIS --
  buildPatterns(needsReview);

  // -- QUICK REVIEW LIST --
  const reviewList = document.getElementById("review-list");
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const div = document.createElement("div");
    div.className = "review-item";
    const icon = !ua ? "&#9723;" : (ua.correct && ua.firstTry ? "&#9989;" : ua.correct ? "&#9989;" : "&#10060;");
    const triesNote = ua && ua.correct && !ua.firstTry ? " (needed a hint)" : ua && !ua.correct ? " (shown answer)" : "";
    div.innerHTML = `
      <span class="review-icon">${icon}</span>
      <div>
        <div class="review-q">Q${i+1} &middot; ${q.typeLabel}</div>
        <div class="review-ans">${ua ? ua.label + "..." : "Not answered"}</div>
        ${triesNote ? `<div class="review-tries">${triesNote}</div>` : ""}
      </div>`;
    reviewList.appendChild(div);
  });

  // -- DETAILED WRONG CARDS --
  buildWrongCards(needsReview);

  window.scrollTo({top:0, behavior:"smooth"});
}

// -- PATTERN ANALYSIS ----------------------------------------------
function buildPatterns(needsReview) {
  const section = document.getElementById("pattern-section");
  if (needsReview.length === 0) return;

  const typeTips = {
    "Topic Sentence": "A topic sentence must name the topic AND signal the paragraph type. Look for keywords: <em>causes/reasons/factors</em> (cause), <em>effects/benefits/consequences</em> (effect), <em>share/similar/alike</em> (similarity), <em>different/differences</em> (contrast), <em>problem/solution</em> (problem-solution).",
    "Odd One Out": "When finding the odd sentence, focus on the <em>signal word</em>, not just the topic. A sentence using <em>both</em> doesn't belong in a contrast paragraph even if the subject matches. Ask: does this sentence's function match the paragraph type?",
    "Concluding Sentence": "A concluding sentence must only summarise what was <em>already said</em>. Reject any option that: adds new information, makes a recommendation, introduces a contrast, or goes off-topic. If it wasn't in the paragraph, it can't be in the conclusion.",
    "Signal Words": "Study the four categories carefully. Cause: <em>because, since, due to, as.</em> Effect: <em>therefore, thus, as a result, consequently, hence.</em> Similarity: <em>both, likewise, similarly, in the same way, too.</em> Contrast: <em>whereas, while, however, although, in contrast, on the other hand.</em>",
    "Paragraph Type": "To identify paragraph type, read the topic sentence and check signal words throughout. Cause paragraphs explain <em>why</em>. Effect paragraphs explain <em>what happens</em>. Problem-solution paragraphs offer <em>solutions</em>. Contrast paragraphs use <em>while/whereas/in contrast.</em> Similarity paragraphs use <em>both/likewise/similarly.</em>",
    "Supporting Sentence": "A supporting sentence must match its paragraph type. Cause: introduce a <em>reason.</em> Effect: introduce a <em>consequence.</em> Similarity: use <em>both/likewise.</em> Contrast: use <em>while/whereas/in contrast.</em> Problem-Solution: propose a <em>solution</em> using <em>one solution is / another approach is.</em>"
  };

  const paraLabels = {
    'cause':'Cause', 'effect':'Effect', 'similarity':'Similarity',
    'contrast':'Contrast', 'problem-solution':'Problem-Solution'
  };

  // Group errors by typeLabel
  const byType = {};
  needsReview.forEach(({qIdx}) => {
    const t = questions[qIdx].typeLabel;
    byType[t] = (byType[t] || 0) + 1;
  });

  // Group errors by paraType
  const byPara = {};
  needsReview.forEach(({qIdx}) => {
    const p = paraTypes[qIdx];
    byPara[p] = (byPara[p] || 0) + 1;
  });

  // Find dominant paraType (if 2+ errors on same para type)
  const topPara = Object.entries(byPara).filter(([,v]) => v >= 2).sort((a,b) => b[1]-a[1]);

  let html = `<div class="section-sep"><div class="section-sep-line"></div><div class="section-sep-label">Focus Areas</div><div class="section-sep-line"></div></div>`;

  // Question-type patterns
  Object.entries(byType).sort((a,b) => b[1]-a[1]).forEach(([type, count]) => {
    const plural = count > 1 ? `${count} errors` : `1 error`;
    html += `<div class="pattern-card">
      <div class="pattern-card-top">
        <span class="pattern-card-icon">&#9888;&#65039;</span>
        <span class="pattern-card-type">${type}</span>
        <span class="pattern-card-count">${plural}</span>
      </div>
      <div class="pattern-card-tip">${typeTips[type] || ""}</div>
    </div>`;
  });

  // Para-type pattern (only if 2+ errors on same para type)
  if (topPara.length > 0) {
    const paraTips = {
      'cause':'Review cause paragraph structure: the topic sentence signals <em>reasons/factors</em>, each supporting sentence introduces one cause using <em>one reason is / another cause is / since / because</em>, and the concluding sentence restates those causes.',
      'effect':'Review effect paragraph structure: the topic sentence signals <em>effects/benefits</em>, each supporting sentence introduces one effect using <em>one effect is / as a result / consequently / therefore</em>, and the concluding sentence restates those effects.',
      'similarity':'Review similarity paragraph structure: the topic sentence signals <em>similarities / share / alike</em>, supporting sentences use <em>both / likewise / similarly / in the same way</em>, and the concluding sentence restates the shared qualities.',
      'contrast':'Review contrast paragraph structure: the topic sentence signals <em>differences / different</em>, supporting sentences use <em>while / whereas / in contrast / however / on the other hand</em>, and the concluding sentence restates key differences.',
      'problem-solution':'Review problem-solution paragraph structure: the topic sentence states the <em>problem</em> clearly, supporting sentences each propose a specific <em>solution</em> using <em>one solution is / another approach is</em>, and the concluding sentence states the <em>outcome or benefit</em>.'
    };
    topPara.forEach(([para, count]) => {
      html += `<div class="pattern-card">
        <div class="pattern-card-top">
          <span class="pattern-card-icon">&#128218;</span>
          <span class="pattern-card-type">${paraLabels[para]} paragraphs: ${count} errors across question types</span>
        </div>
        <div class="pattern-card-tip">${paraTips[para] || ""}</div>
      </div>`;
    });
  }

  section.innerHTML = html;
}

// -- DETAILED WRONG CARDS ------------------------------------------
function buildWrongCards(needsReview) {
  const section = document.getElementById("wrong-section");
  if (needsReview.length === 0) return;

  let html = `<div class="section-sep"><div class="section-sep-line"></div><div class="section-sep-label">Review Your Mistakes</div><div class="section-sep-line"></div></div>`;

  needsReview.forEach(({qIdx, ua}) => {
    const q = questions[qIdx];
    const wi = ua.wrongIdx;

    // Get wrong option text and hint
    let choseText = "";
    let hintText  = "";
    if (q.type === "mc" && wi !== -1 && q.options[wi]) {
      choseText = q.options[wi].text;
      hintText  = q.hints[wi] || "";
    } else if (q.type === "odd" && wi !== -1 && q.sentences[wi]) {
      choseText = q.sentences[wi].text;
      hintText  = q.sentences[wi].hint || "";
    }

    const statusIcon = ua.correct ? "&#9989;" : "&#10060;";
    const statusNote = ua.correct ? "got it eventually" : "answer was revealed";

    html += `<div class="wrong-card">
      <div class="wrong-card-header">
        <span style="font-size:16px">${statusIcon}</span>
        <span class="wrong-card-qnum">Q${qIdx+1} &middot; ${q.typeLabel} &middot; ${paraTypes[qIdx]}</span>
        <span style="font-size:11px;color:var(--muted);margin-left:auto">${statusNote}</span>
      </div>`;

    if (choseText) {
      html += `<div class="wrong-card-block">
        <div class="wrong-block-label lbl-chose">&#10007; You chose</div>
        <div class="wrong-block-text txt-chose">${choseText}</div>
      </div>`;
    }

    if (hintText) {
      html += `<div class="wrong-card-block">
        <div class="wrong-block-label lbl-hint">&#128161; Why it doesn't work</div>
        <div class="wrong-block-text txt-hint">${hintText}</div>
      </div>`;
    }

    html += `<div class="wrong-card-block">
      <div class="wrong-block-label lbl-expl">&#10003; Correct answer explained</div>
      <div class="wrong-block-text txt-expl">${q.explanation}</div>
    </div>`;

    html += `</div>`;
  });

  section.innerHTML = html;
}

// -- NAVIGATION ----------------------------------------------------
function restart() {
  current = 0; score = 0; userAnswers = []; firstWrongIdx = -1;
  document.getElementById("results-screen").classList.remove("show");
  document.getElementById("quiz-area").style.display = "";
  document.querySelector(".progress-wrap").style.display = "";
  document.getElementById("pattern-section").innerHTML = "";
  document.getElementById("review-list").innerHTML = "";
  document.getElementById("wrong-section").innerHTML = "";
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

// kick off
renderQuestion();
</script>

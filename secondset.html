<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paragraph Skills — Set 3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2; --card: #ffffff; --ink: #1a1a2e; --muted: #6b6b80;
    --accent: #2d6a6a; --accent-light: #e0f0f0; --gold: #c6963a;
    --correct: #2d7a4a; --correct-bg: #e8f7ee;
    --wrong: #b33030; --wrong-bg: #fdecea;
    --why-bg: #f0f4ff; --why-border: #93c5fd; --why-text: #1e3a8a;
    --nudge-bg: #fff0f0; --nudge-border: #fca5a5;
    --border: #e4ddd4; --shadow: 0 4px 24px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--ink); padding: 0 16px 60px; }

  .header { text-align: center; padding: 48px 16px 32px; }
  .header .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,42px); color: var(--ink); line-height: 1.2; }
  .header p { margin-top: 10px; color: var(--muted); font-size: 15px; max-width: 540px; margin-left: auto; margin-right: auto; }

  .progress-wrap { max-width: 680px; margin: 0 auto 32px; padding: 0 8px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .progress-bar-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  .card { max-width: 680px; margin: 0 auto; background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .card-tag { display: flex; align-items: center; gap: 10px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: #fafafa; }
  .tag-pill { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; }
  .tag-ts  { background: #dbeafe; color: #1e40af; }
  .tag-ooo { background: #fce7f3; color: #9d174d; }
  .tag-cs  { background: #d1fae5; color: #065f46; }
  .tag-ps  { background: #ede9fe; color: #5b21b6; }
  .tag-sw  { background: #fff3cd; color: #92400e; }
  .tag-fo  { background: #fee2e2; color: #991b1b; }

  .card-body { padding: 28px 28px 10px; }
  .question-text { font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--ink); margin-bottom: 22px; }
  .para-box { background: var(--bg); border-left: 4px solid var(--gold); border-radius: 0 10px 10px 0; padding: 16px 20px; font-size: 14.5px; line-height: 1.8; color: #333; margin-bottom: 22px; font-style: italic; }
  .challenge-note { display: inline-block; margin-bottom: 16px; padding: 6px 14px; background: #fff8e1; border: 1px solid var(--gold); border-radius: 8px; font-size: 12.5px; font-weight: 600; color: #7a5c00; }

  /* MAIN OPTIONS */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: flex-start; gap: 12px; width: 100%; text-align: left; padding: 14px 18px; border: 2px solid var(--border); border-radius: 12px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14.5px; line-height: 1.55; color: var(--ink); cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.1s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); transform: translateX(3px); }
  .option-btn:disabled { cursor: default; }
  .option-btn.state-correct        { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .option-btn.state-wrong-selected { border-color: var(--wrong); background: var(--wrong-bg); }
  .option-btn.state-reveal-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .opt-letter { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; flex-shrink: 0; margin-top: 1px; border-radius: 50%; background: var(--border); font-size: 12px; font-weight: 700; transition: background 0.2s, color 0.2s; }
  .option-btn.state-correct .opt-letter, .option-btn.state-reveal-correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.state-wrong-selected .opt-letter { background: var(--wrong); color: #fff; }

  /* ODD ONE OUT */
  .sentences { display: flex; flex-direction: column; gap: 10px; }
  .sentence-btn { width: 100%; text-align: left; padding: 13px 18px; border: 2px solid var(--border); border-radius: 12px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.65; color: var(--ink); cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .sentence-btn:hover:not(:disabled) { border-color: #9d174d; background: #fce7f3; }
  .sentence-btn:disabled { cursor: default; }
  .sentence-btn.state-correct        { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-wrong-selected { border-color: var(--wrong); background: var(--wrong-bg); }
  .sentence-btn.state-reveal-correct { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-reveal-wrong   { border-color: var(--border); opacity: 0.6; }

  /* WHY BOX */
  .why-box { display: none; margin-top: 16px; padding: 16px 18px; border-radius: 12px; background: var(--why-bg); border: 1px solid var(--why-border); animation: fadeUp 0.25s ease both; }
  .why-box.show { display: block; }
  .why-label { font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; }
  .why-question { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 12px; line-height: 1.5; }
  .why-options { display: flex; flex-direction: column; gap: 8px; }
  .why-btn { width: 100%; text-align: left; padding: 10px 14px; border: 2px solid var(--why-border); border-radius: 10px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 13.5px; line-height: 1.5; color: var(--ink); cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .why-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .why-btn:disabled { cursor: default; }
  .why-btn.why-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .why-btn.why-wrong   { border-color: var(--nudge-border); background: var(--nudge-bg); }
  .nudge { display: none; margin-top: 10px; padding: 8px 14px; border-radius: 8px; background: var(--nudge-bg); border: 1px solid var(--nudge-border); font-size: 13px; color: var(--wrong); font-weight: 600; }
  .nudge.show { display: block; animation: fadeUp 0.2s ease both; }

  /* FEEDBACK */
  .feedback { display: none; margin-top: 14px; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .feedback.show { display: block; animation: fadeUp 0.3s ease both; }
  .feedback.fb-correct { background: var(--correct-bg); color: #065f46; border: 1px solid #a7f3d0; }
  .feedback.fb-wrong   { background: #f0f4ff; color: #1e3a8a; border: 1px solid #bfdbfe; }

  /* NEXT */
  .next-wrap { padding: 14px 28px 28px; display: none; }
  .next-wrap.show { display: block; }
  .next-btn { width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; transition: background 0.2s, transform 0.1s; }
  .next-btn:hover { background: var(--accent); transform: translateY(-1px); }

  /* RESULTS */
  .results { display: none; max-width: 680px; margin: 0 auto; animation: fadeUp 0.4s ease both; }
  .results.show { display: block; }
  .results-card { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 40px 28px; text-align: center; }
  .score-ring { width: 130px; height: 130px; margin: 0 auto 24px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg   { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Playfair Display', serif; font-size: 30px; color: var(--ink); }
  .results-title { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
  .results-sub   { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .divider { width: 40px; height: 3px; background: var(--gold); border-radius: 99px; margin: 0 auto 20px; }
  .review { text-align: left; margin-top: 24px; }
  .review-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .review-item:last-child { border-bottom: none; }
  .review-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .review-q    { color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .review-ans  { color: var(--ink); margin-top: 2px; }
  .review-tries { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .restart-btn { margin-top: 28px; width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .restart-btn:hover { background: var(--accent); }
  @media (max-width: 480px) { .card-body { padding: 20px 18px 10px; } .card-tag { padding: 14px 18px; } .next-wrap { padding: 12px 18px 22px; } }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">English Writing Skills</div>
  <h1>Paragraph Challenge</h1>
  <p>Units 5, 6 & 7 — Opinion, Cause-Effect, and Comparison paragraphs.</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Question 1 of 25</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="prog-fill" style="width:4%"></div>
  </div>
</div>

<div id="quiz-area"></div>

<div class="results" id="results-screen">
  <div class="results-card">
    <div class="score-ring">
      <svg viewBox="0 0 130 130" width="130" height="130">
        <circle class="ring-bg" cx="65" cy="65" r="55"/>
        <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="55" stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="score-number" id="score-display">0/25</div>
    </div>
    <div class="divider"></div>
    <div class="results-title" id="results-title">Well done!</div>
    <div class="results-sub"   id="results-sub">Here's a summary of your answers.</div>
    <div class="review"        id="review-list"></div>
    <button class="restart-btn" onclick="restart()">Try Again ↺</button>
  </div>
</div>

<script>
// WHY choices format: each wrong option has a .why array of {text, correct}
// Correct main answer has no .why needed.

const W = (choices) => ({ choices }); // shorthand

const questions = [

// ── 1. TOPIC SENTENCE — Opinion (Vaccination) ─────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this opinion paragraph.",
  body:"First, vaccines protect not only the individual but also vulnerable members of society — such as newborns and the elderly — who are unable to receive vaccinations themselves. This principle, known as herd immunity, means that the more people who are vaccinated, the safer everyone becomes. In addition, widespread vaccination has already eliminated or drastically reduced diseases that once killed millions, including smallpox and polio. Furthermore, the cost of vaccinating a population is far lower than the cost of treating widespread disease outbreaks, making vaccination an economically sound public health strategy. For these reasons, vaccination programmes must be protected and expanded.",
  options:[
    { text:"Vaccines work by introducing a weakened form of a disease into the body to trigger an immune response.", correct:false,
      why: W([
        {text:"It's a scientific fact, not a personal opinion.", correct:true},
        {text:"It promises both sides but the paragraph only shows one.", correct:false},
        {text:"It uses a cause signal word instead of an opinion signal.", correct:false},
      ])
    },
    { text:"I strongly believe that vaccination should be mandatory for all children.", correct:true },
    { text:"There are several reasons why vaccination rates have been declining in recent years.", correct:false,
      why: W([
        {text:"It signals a cause paragraph, not an opinion paragraph.", correct:true},
        {text:"It is too vague and has no controlling idea.", correct:false},
        {text:"It introduces a negative idea that contradicts the paragraph.", correct:false},
      ])
    },
    { text:"Vaccination has both supporters and critics in many countries around the world.", correct:false,
      why: W([
        {text:"It promises both sides, but the paragraph argues only one position.", correct:true},
        {text:"It is a cause signal — it will explain reasons.", correct:false},
        {text:"It is a historical fact with no opinion language.", correct:false},
      ])
    },
  ],
  explanation:"Option B is correct. <em>'I strongly believe that'</em> is a clear opinion signal, and <em>'mandatory for all children'</em> is a specific, arguable claim. The supporting sentences then give three distinct reasons to support this position: herd immunity, disease elimination, and economic benefit."
},

// ── 2. TOPIC SENTENCE — Cause (Obesity) ──────────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this cause paragraph.",
  body:"One major reason is the widespread availability of cheap, processed food that is high in sugar, fat, and calories but low in nutritional value. Fast food chains and ready-made meals have made unhealthy eating incredibly convenient for busy families. Another cause is the increasingly sedentary lifestyle of modern people, who spend long hours sitting at desks, in cars, and in front of screens. Furthermore, food manufacturers spend billions on advertising, particularly targeting children, creating powerful psychological associations between happiness and high-calorie snack foods. Finally, many people lack sufficient nutritional education and are unaware of just how damaging their daily dietary choices can be over time.",
  options:[
    { text:"Obesity has become one of the most serious public health crises of the twenty-first century.", correct:false,
      why: W([
        {text:"It states a general fact but gives no cause signal.", correct:true},
        {text:"It signals an effects paragraph, not a causes paragraph.", correct:false},
        {text:"It is an opinion — it takes a personal position.", correct:false},
      ])
    },
    { text:"Obesity leads to several serious health consequences, including diabetes, heart disease, and joint problems.", correct:false,
      why: W([
        {text:"'Leads to' is an effect signal — it describes consequences, not causes.", correct:true},
        {text:"It is too vague and doesn't name the topic clearly.", correct:false},
        {text:"It is an opinion sentence — it uses personal judgement language.", correct:false},
      ])
    },
    { text:"There are several important factors that contribute to the growing problem of obesity in modern societies.", correct:true },
    { text:"In my opinion, governments should do far more to discourage the consumption of unhealthy food.", correct:false,
      why: W([
        {text:"It is an opinion/recommendation — not a cause topic sentence.", correct:true},
        {text:"It promises both sides, but the paragraph shows only one.", correct:false},
        {text:"It signals an effects paragraph rather than a causes paragraph.", correct:false},
      ])
    },
  ],
  explanation:"Option C is correct. <em>'Several important factors that contribute to'</em> is a clear cause signal. It names the topic (obesity) and tells the reader the paragraph will explain reasons. Each supporting sentence then introduces one cause using <em>one major reason, another cause, furthermore, finally</em>."
},

// ── 3. TOPIC SENTENCE — Effect (Traffic Jams) ────────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this effect paragraph.",
  body:"First of all, drivers stuck in heavy traffic waste enormous amounts of time that could otherwise be spent working, relaxing, or with family — reducing overall quality of life. In addition, the constant stop-start movement of congested traffic causes vehicles to burn far more fuel and release significantly higher levels of carbon dioxide and harmful particulates into the air. Furthermore, the psychological strain of daily commuting through heavy traffic has been directly linked to higher levels of stress, anxiety, and even burnout among regular drivers. Finally, emergency services such as ambulances and fire engines are frequently delayed by congestion, putting lives at serious risk when every minute matters.",
  options:[
    { text:"Traffic jams are caused by a growing number of private cars, poor urban planning, and inadequate public transport.", correct:false,
      why: W([
        {text:"It uses cause language — 'are caused by' — but the paragraph describes effects.", correct:true},
        {text:"It is an opinion that takes a personal position on traffic.", correct:false},
        {text:"It promises a comparison between two subjects.", correct:false},
      ])
    },
    { text:"In my opinion, governments must invest urgently in public transport to reduce traffic congestion in cities.", correct:false,
      why: W([
        {text:"It is an opinion/recommendation — the paragraph is a neutral effects paragraph.", correct:true},
        {text:"It signals a similarities paragraph — it compares two things.", correct:false},
        {text:"It is a general fact about traffic with no controlling idea.", correct:false},
      ])
    },
    { text:"Traffic congestion in modern cities has several serious and wide-ranging consequences.", correct:true },
    { text:"Traffic jams are a daily reality for millions of commuters living in large cities around the world.", correct:false,
      why: W([
        {text:"It is a factual background statement with no controlling idea or direction.", correct:true},
        {text:"It signals a cause paragraph — it explains why something happens.", correct:false},
        {text:"It promises to compare two different types of traffic.", correct:false},
      ])
    },
  ],
  explanation:"Option C is correct. <em>'Several serious and wide-ranging consequences'</em> clearly signals an effect paragraph. The word <em>consequences</em> tells the reader the paragraph will describe what traffic jams cause, not why they occur. Each supporting sentence then presents one specific consequence."
},

// ── 4. TOPIC SENTENCE — Similarity (E-books vs Printed Books) ─
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this similarity paragraph.",
  body:"Both e-books and printed books deliver the same written content — the words, stories, and ideas the author intended — to the reader in full. Similarly, both require the reader's active concentration and imagination, unlike passive media such as television or social media. In the same way, both formats allow readers to progress at their own pace, pausing to reflect, re-reading difficult sections, and spending as long as needed on each page. Furthermore, both e-books and printed books are widely available in libraries and online platforms, ensuring access regardless of geography or economic background.",
  options:[
    { text:"E-books and printed books offer very different reading experiences in terms of comfort, feel, and convenience.", correct:false,
      why: W([
        {text:"'Very different' signals a contrast paragraph, not a similarity paragraph.", correct:true},
        {text:"It is an opinion — it takes a personal position on which is better.", correct:false},
        {text:"It signals a cause paragraph — it will explain reasons for a difference.", correct:false},
      ])
    },
    { text:"E-books have become increasingly popular since digital reading devices first became widely available.", correct:false,
      why: W([
        {text:"It is a general fact about trends — no similarity signal is present.", correct:true},
        {text:"It signals a contrast — it introduces a difference between old and new.", correct:false},
        {text:"It is an opinion — it argues that e-books are better than printed books.", correct:false},
      ])
    },
    { text:"Despite their obvious differences in format, e-books and printed books share several fundamental qualities.", correct:true },
    { text:"In my view, printed books offer a richer and more satisfying reading experience than e-books.", correct:false,
      why: W([
        {text:"It is a personal opinion that ranks one above the other — not a similarity signal.", correct:true},
        {text:"It signals a contrast — it highlights a difference between the two formats.", correct:false},
        {text:"It is a cause signal — it will explain reasons for preferring printed books.", correct:false},
      ])
    },
  ],
  explanation:"Option C is correct. The concession (<em>'despite their obvious differences'</em>) adds sophistication, and <em>'share several fundamental qualities'</em> clearly signals a similarity paragraph. All four supporting sentences then use similarity language: <em>both, similarly, in the same way, furthermore both</em>."
},

// ── 5. TOPIC SENTENCE — Contrast (Public Transport vs Cars) ───
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this contrast paragraph.",
  body:"Using public transport is generally far cheaper than owning and maintaining a private car, which requires insurance, fuel, servicing, and parking costs. Furthermore, public transport produces significantly fewer carbon emissions per passenger than private cars, making it a considerably more environmentally friendly choice. In addition, public transport relieves road congestion — fewer cars means faster journeys for everyone — while private car use actively contributes to traffic jams and their associated costs. Finally, passengers on trains and buses can read, work, or rest during their journey, whereas drivers must concentrate entirely on the road and cannot use travel time productively.",
  options:[
    { text:"Both public transport and private cars allow people to travel from one place to another conveniently.", correct:false,
      why: W([
        {text:"'Both' is a similarity signal — the paragraph highlights differences, not shared qualities.", correct:true},
        {text:"It is an opinion sentence — it argues that one option is better.", correct:false},
        {text:"It signals a cause paragraph — it explains reasons for using transport.", correct:false},
      ])
    },
    { text:"Using public transport and driving a private car are different in several important and practical ways.", correct:true },
    { text:"There are several reasons why more people are choosing public transport over private cars.", correct:false,
      why: W([
        {text:"It signals a cause paragraph — 'reasons why' introduces explanations, not contrasts.", correct:true},
        {text:"It promises to compare similarities between two types of transport.", correct:false},
        {text:"It is an opinion — it recommends public transport over cars.", correct:false},
      ])
    },
    { text:"In my opinion, everyone should give up their private car and use public transport instead.", correct:false,
      why: W([
        {text:"It is a personal opinion and recommendation — the paragraph is a neutral contrast.", correct:true},
        {text:"It promises to discuss both sides — but the paragraph shows only differences.", correct:false},
        {text:"It uses an effect signal — it describes consequences of a choice.", correct:false},
      ])
    },
  ],
  explanation:"Option B is correct. It introduces both subjects and uses <em>'different in several important and practical ways'</em> to signal a contrast paragraph. Each supporting sentence then develops one specific contrast using <em>while, whereas, while</em>."
},

// ── 6. TOPIC SENTENCE — Opinion, harder (Part-time jobs) ──────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this opinion paragraph.",
  body:"To begin with, working part-time teaches young people how to manage their time effectively, balancing their studies, work, and personal life — a skill that will serve them throughout their adult lives. In addition, students who earn their own money develop a far healthier relationship with finances, learning firsthand the value of budgeting and saving rather than relying entirely on their parents. Furthermore, the workplace exposes students to real professional environments, helping them build communication skills, confidence, and a network of contacts that cannot be developed in a classroom alone. For all these reasons, encouraging university students to take on part-time work is one of the most valuable forms of preparation for adult life.",
  options:[
    { text:"Many university students around the world take on part-time jobs to help cover their living expenses.", correct:false,
      why: W([
        {text:"It is a factual observation — it takes no position and has no opinion language.", correct:true},
        {text:"It promises both advantages and disadvantages of working part-time.", correct:false},
        {text:"It signals a cause paragraph — 'to help cover' explains a reason.", correct:false},
      ])
    },
    { text:"Working part-time during university has both advantages and disadvantages for students.", correct:false,
      why: W([
        {text:"It promises both sides, but the paragraph discusses only advantages.", correct:true},
        {text:"It is a general fact about part-time work with no personal stance.", correct:false},
        {text:"It signals an effects paragraph — it will describe consequences neutrally.", correct:false},
      ])
    },
    { text:"I believe that university students should be actively encouraged to take on part-time employment.", correct:true },
    { text:"There are several reasons why part-time work has become increasingly common among university students.", correct:false,
      why: W([
        {text:"It signals a cause paragraph about trends — not an opinion in favour of part-time work.", correct:true},

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let current = 0, score = 0;
let userAnswers = [];
let hintedThisQ = false;

// ─────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────
function renderQuestion() {
  hintedThisQ = false;
  const q = questions[current];
  const area = document.getElementById("quiz-area");
  area.innerHTML = "";

  document.getElementById("prog-label").textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById("score-label").textContent = `Score: ${score}`;
  document.getElementById("prog-fill").style.width = `${((current+1)/questions.length)*100}%`;

  const card = document.createElement("div");
  card.className = "card";

  const challengeNote = q.challenge
    ? `<div class="challenge-note">⚠️ All options begin with the same signal phrase — focus on the content.</div>`
    : "";

  card.innerHTML = `
    <div class="card-tag">
      <span class="tag-pill ${q.typeClass}">${q.typeLabel}</span>
    </div>
    <div class="card-body">
      <p class="question-text">${q.instruction}</p>
      ${challengeNote}
      ${q.body ? `<div class="para-box">${q.body}</div>` : ""}
      <div id="interaction-area"></div>
      <div class="why-box" id="why-box"></div>
      <div class="feedback" id="feedback-box"></div>
    </div>
  `;
  area.appendChild(card);

  const nextWrap = document.createElement("div");
  nextWrap.className = "next-wrap";
  nextWrap.id = "next-wrap";
  const isLast = current === questions.length - 1;
  nextWrap.innerHTML = `<button class="next-btn" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">${isLast ? "See Results →" : "Next Question →"}</button>`;
  card.appendChild(nextWrap);

  if (q.type === "odd") buildOdd(q);
  else buildMC(q);
}

// ─── MULTIPLE CHOICE ─────────────────────────────────────────
function buildMC(q) {
  const ia = document.getElementById("interaction-area");
  const letters = ["A","B","C","D"];
  const div = document.createElement("div");
  div.className = "options";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => handleMC(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleMC(q, idx, container) {
  const btns = container.querySelectorAll(".option-btn");
  const isCorrect = q.options[idx].correct;

  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.options[idx].text.substring(0,65)});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    hintedThisQ = true;
    btns[idx].classList.add("state-wrong-selected");
    btns[idx].disabled = true;
    showWhyQuestion(q.options[idx].why, q.explanation, () => {
      // after correct why: reveal correct main answer
      btns.forEach((b, i) => {
        b.disabled = true;
        if (q.options[i].correct) b.classList.add("state-reveal-correct");
      });
      userAnswers.push({correct:false, firstTry:false, label: q.options[idx].text.substring(0,65)});
      document.getElementById("next-wrap").classList.add("show");
    });
  }
}

// ─── ODD ONE OUT ─────────────────────────────────────────────
function buildOdd(q) {
  const ia = document.getElementById("interaction-area");
  const div = document.createElement("div");
  div.className = "sentences";
  q.sentences.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "sentence-btn";
    btn.innerHTML = s.text;
    btn.onclick = () => handleOdd(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleOdd(q, idx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  const isCorrect = q.sentences[idx].correct;

  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.sentences[idx].text.substring(0,65)});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    hintedThisQ = true;
    btns[idx].classList.add("state-wrong-selected");
    btns[idx].disabled = true;
    // For odd-one-out, "belongs" sentences: show why it actually belongs
    showWhyQuestion(q.sentences[idx].why, q.explanation, () => {
      btns.forEach((b, i) => {
        b.disabled = true;
        if (q.sentences[i].correct) b.classList.add("state-reveal-correct");
        else if (i === idx) b.classList.add("state-reveal-wrong");
      });
      userAnswers.push({correct:false, firstTry:false, label: q.sentences[idx].text.substring(0,65)});
      document.getElementById("next-wrap").classList.add("show");
    });
  }
}

// ─── WHY SUB-QUESTION ─────────────────────────────────────────
function showWhyQuestion(why, mainExplanation, onCorrect) {
  const whyBox = document.getElementById("why-box");
  whyBox.innerHTML = "";
  whyBox.classList.add("show");

  const label = document.createElement("div");
  label.className = "why-label";
  label.textContent = "🤔 Identify the problem";
  whyBox.appendChild(label);

  const q = document.createElement("div");
  q.className = "why-question";
  q.textContent = "Why doesn't this option work?";
  whyBox.appendChild(q);

  const nudge = document.createElement("div");
  nudge.className = "nudge";
  nudge.textContent = "Not quite — think again!";

  const optDiv = document.createElement("div");
  optDiv.className = "why-options";

  why.choices.forEach(choice => {
    const btn = document.createElement("button");
    btn.className = "why-btn";
    btn.textContent = choice.text;
    btn.onclick = () => {
      if (choice.correct) {
        // correct reason identified
        optDiv.querySelectorAll(".why-btn").forEach(b => b.disabled = true);
        btn.classList.add("why-correct");
        nudge.classList.remove("show");
        whyBox.classList.remove("show");
        showFeedback(false, mainExplanation);
        onCorrect();
      } else {
        // wrong reason
        btn.classList.add("why-wrong");
        btn.disabled = true;
        nudge.classList.add("show");
      }
    };
    optDiv.appendChild(btn);
  });

  whyBox.appendChild(optDiv);
  whyBox.appendChild(nudge);
}

// ─── FEEDBACK ─────────────────────────────────────────────────
function showFeedback(isCorrect, explanation) {
  const box = document.getElementById("feedback-box");
  box.className = `feedback show ${isCorrect ? "fb-correct" : "fb-wrong"}`;
  box.innerHTML = (isCorrect ? "<strong>✓ Correct!</strong> " : "<strong>Here's why:</strong> ") + explanation;
}

// ─── NAVIGATION ───────────────────────────────────────────────
function nextQuestion() {
  current++;
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

// ─── RESULTS ──────────────────────────────────────────────────
function showResults() {
  document.getElementById("quiz-area").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";
  const screen = document.getElementById("results-screen");
  screen.classList.add("show");

  const pct = score / questions.length;
  const circumference = 345.4;
  setTimeout(() => {
    document.getElementById("ring-fill").style.strokeDashoffset = circumference - pct * circumference;
  }, 100);
  document.getElementById("score-display").textContent = `${score}/${questions.length}`;

  let title, sub;
  if (pct === 1)        { title = "Perfect score! 🎉"; sub = "Exceptional — every analysis was spot on!"; }
  else if (pct >= 0.88) { title = "Excellent work! ✨"; sub = "Very strong critical reading skills."; }
  else if (pct >= 0.72) { title = "Well done! 👍"; sub = "Good effort — review the questions you found tricky."; }
  else if (pct >= 0.56) { title = "Good effort! 📝"; sub = "Keep going — each attempt builds your skills."; }
  else                  { title = "Keep practising! 📚"; sub = "This set is challenging — try again and trust your reasoning."; }

  document.getElementById("results-title").textContent = title;
  document.getElementById("results-sub").textContent   = sub;

  const reviewList = document.getElementById("review-list");
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const div = document.createElement("div");
    div.className = "review-item";
    const icon = !ua ? "⬜" : (ua.correct && ua.firstTry ? "✅" : ua.correct ? "✅" : "❌");
    const triesNote = ua && ua.correct && !ua.firstTry ? " (needed a hint)" : ua && !ua.correct ? " (shown answer)" : "";
    div.innerHTML = `
      <span class="review-icon">${icon}</span>
      <div>
        <div class="review-q">Q${i+1} · ${q.typeLabel}</div>
        <div class="review-ans">${ua ? ua.label + "…" : "Not answered"}</div>
        ${triesNote ? `<div class="review-tries">${triesNote}</div>` : ""}
      </div>`;
    reviewList.appendChild(div);
  });
  window.scrollTo({top:0, behavior:"smooth"});
}

function restart() {
  current = 0; score = 0; userAnswers = [];
  document.getElementById("results-screen").classList.remove("show");
  document.getElementById("quiz-area").style.display = "";
  document.querySelector(".progress-wrap").style.display = "";
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

renderQuestion();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paragraph Skills — Set 2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f2;
    --card: #ffffff;
    --ink: #1a1a2e;
    --muted: #6b6b80;
    --accent: #2d6a6a;
    --accent-light: #e0f0f0;
    --gold: #c6963a;
    --correct: #2d7a4a;
    --correct-bg: #e8f7ee;
    --wrong: #b33030;
    --wrong-bg: #fdecea;
    --hint-bg: #fffbea;
    --hint-border: #f0c040;
    --hint-text: #7a5c00;
    --border: #e4ddd4;
    --shadow: 0 4px 24px rgba(26,26,46,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); min-height: 100vh; color: var(--ink); padding: 0 16px 60px; }

  .header { text-align: center; padding: 48px 16px 32px; }
  .header .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
  .header h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px,5vw,42px); color: var(--ink); line-height: 1.2; }
  .header p { margin-top: 10px; color: var(--muted); font-size: 15px; max-width: 520px; margin-left: auto; margin-right: auto; }

  .progress-wrap { max-width: 680px; margin: 0 auto 32px; padding: 0 8px; }
  .progress-meta { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; letter-spacing: 0.5px; text-transform: uppercase; }
  .progress-bar-track { height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--gold)); border-radius: 99px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }

  .card { max-width: 680px; margin: 0 auto; background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); overflow: hidden; animation: fadeUp 0.4s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  .card-tag { display: flex; align-items: center; gap: 10px; padding: 18px 28px; border-bottom: 1px solid var(--border); background: #fafafa; }
  .tag-pill { font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; }
  .tag-ts  { background: #dbeafe; color: #1e40af; }
  .tag-ooo { background: #fce7f3; color: #9d174d; }
  .tag-cs  { background: #d1fae5; color: #065f46; }
  .tag-ps  { background: #ede9fe; color: #5b21b6; }
  .tag-sw  { background: #fff3cd; color: #92400e; }
  .tag-fo  { background: #fee2e2; color: #991b1b; }

  .card-body { padding: 28px 28px 10px; }
  .question-text { font-size: 16px; font-weight: 500; line-height: 1.65; color: var(--ink); margin-bottom: 22px; }
  .para-box { background: var(--bg); border-left: 4px solid var(--gold); border-radius: 0 10px 10px 0; padding: 16px 20px; font-size: 14.5px; line-height: 1.8; color: #333; margin-bottom: 22px; font-style: italic; }

  .challenge-note { display: inline-block; margin-bottom: 16px; padding: 6px 14px; background: #fff8e1; border: 1px solid var(--gold); border-radius: 8px; font-size: 12.5px; font-weight: 600; color: var(--hint-text); }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option-btn { display: flex; align-items: flex-start; gap: 12px; width: 100%; text-align: left; padding: 14px 18px; border: 2px solid var(--border); border-radius: 12px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14.5px; line-height: 1.55; color: var(--ink); cursor: pointer; transition: border-color 0.2s, background 0.2s, transform 0.1s; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); transform: translateX(3px); }
  .option-btn:disabled { cursor: default; }
  .option-btn.state-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .option-btn.state-wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  .option-btn.state-hinted { border-color: var(--hint-border); background: var(--hint-bg); }
  .option-btn.state-reveal-correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); font-weight: 600; }
  .opt-letter { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; flex-shrink: 0; margin-top: 1px; border-radius: 50%; background: var(--border); font-size: 12px; font-weight: 700; transition: background 0.2s, color 0.2s; }
  .option-btn.state-correct .opt-letter, .option-btn.state-reveal-correct .opt-letter { background: var(--correct); color: #fff; }
  .option-btn.state-wrong .opt-letter { background: var(--wrong); color: #fff; }
  .option-btn.state-hinted .opt-letter { background: var(--hint-border); color: #fff; }

  .sentences { display: flex; flex-direction: column; gap: 10px; }
  .sentence-btn { width: 100%; text-align: left; padding: 13px 18px; border: 2px solid var(--border); border-radius: 12px; background: #fff; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.65; color: var(--ink); cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .sentence-btn:hover:not(:disabled) { border-color: #9d174d; background: #fce7f3; }
  .sentence-btn:disabled { cursor: default; }
  .sentence-btn.state-correct { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-hinted { border-color: var(--hint-border); background: var(--hint-bg); }
  .sentence-btn.state-reveal-correct { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); font-weight: 600; }
  .sentence-btn.state-reveal-wrong { border-color: var(--border); opacity: 0.6; }

  .hint-box { display: none; margin-top: 14px; padding: 12px 16px; border-radius: 10px; background: var(--hint-bg); border: 1px solid var(--hint-border); font-size: 13.5px; line-height: 1.6; color: var(--hint-text); }
  .hint-box.show { display: block; animation: fadeUp 0.25s ease both; }
  .hint-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--hint-border); margin-bottom: 5px; }

  .show-why-wrap { display: none; margin-top: 10px; }
  .show-why-wrap.show { display: block; }
  .show-why-btn { background: none; border: 2px solid var(--ink); border-radius: 10px; padding: 9px 18px; font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 600; color: var(--ink); cursor: pointer; transition: background 0.2s, color 0.2s; }
  .show-why-btn:hover { background: var(--ink); color: #fff; }

  .feedback { display: none; margin-top: 14px; padding: 14px 18px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
  .feedback.show { display: block; animation: fadeUp 0.3s ease both; }
  .feedback.fb-correct { background: var(--correct-bg); color: #065f46; border: 1px solid #a7f3d0; }
  .feedback.fb-wrong { background: #f0f4ff; color: #1e3a8a; border: 1px solid #bfdbfe; }

  .next-wrap { padding: 14px 28px 28px; display: none; }
  .next-wrap.show { display: block; }
  .next-btn { width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 0.3px; transition: background 0.2s, transform 0.1s; }
  .next-btn:hover { background: var(--accent); transform: translateY(-1px); }

  .results { display: none; max-width: 680px; margin: 0 auto; animation: fadeUp 0.4s ease both; }
  .results.show { display: block; }
  .results-card { background: var(--card); border-radius: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); padding: 40px 28px; text-align: center; }
  .score-ring { width: 130px; height: 130px; margin: 0 auto 24px; position: relative; }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring .ring-bg { fill: none; stroke: var(--border); stroke-width: 10; }
  .score-ring .ring-fill { fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
  .score-number { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: 'Playfair Display', serif; font-size: 30px; color: var(--ink); }
  .results-title { font-family: 'Playfair Display', serif; font-size: 26px; margin-bottom: 8px; }
  .results-sub { color: var(--muted); font-size: 15px; margin-bottom: 28px; }
  .divider { width: 40px; height: 3px; background: var(--gold); border-radius: 99px; margin: 0 auto 20px; }
  .review { text-align: left; margin-top: 24px; }
  .review-item { display: flex; align-items: flex-start; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 14px; line-height: 1.5; }
  .review-item:last-child { border-bottom: none; }
  .review-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .review-q { color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .review-ans { color: var(--ink); margin-top: 2px; }
  .review-tries { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .restart-btn { margin-top: 28px; width: 100%; padding: 14px; background: var(--ink); color: #fff; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
  .restart-btn:hover { background: var(--accent); }
  @media (max-width: 480px) { .card-body { padding: 20px 18px 10px; } .card-tag { padding: 14px 18px; } .next-wrap { padding: 12px 18px 22px; } }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">English Writing Skills — Set 2</div>
  <h1>Paragraph Mastery</h1>
  <p>Social media · Podcasts · Books vs Films · School start times · Fast fashion</p>
</div>

<div class="progress-wrap">
  <div class="progress-meta">
    <span id="prog-label">Question 1 of 25</span>
    <span id="score-label">Score: 0</span>
  </div>
  <div class="progress-bar-track">
    <div class="progress-bar-fill" id="prog-fill" style="width:4%"></div>
  </div>
</div>

<div id="quiz-area"></div>

<div class="results" id="results-screen">
  <div class="results-card">
    <div class="score-ring">
      <svg viewBox="0 0 130 130" width="130" height="130">
        <circle class="ring-bg" cx="65" cy="65" r="55"/>
        <circle class="ring-fill" id="ring-fill" cx="65" cy="65" r="55" stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="score-number" id="score-display">0/25</div>
    </div>
    <div class="divider"></div>
    <div class="results-title" id="results-title">Well done!</div>
    <div class="results-sub" id="results-sub">Here's a summary of your answers.</div>
    <div class="review" id="review-list"></div>
    <button class="restart-btn" onclick="restart()">Try Again ↺</button>
  </div>
</div>

<script>
const questions = [

// ── 1. TOPIC SENTENCE — Opinion (social media age limits) ─────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this opinion paragraph.",
  body:"First, research consistently shows that excessive social media use is linked to higher rates of anxiety, depression, and low self-esteem among teenagers. In addition, cyberbullying — which is far more widespread online than in face-to-face settings — poses a serious threat to young people's mental safety and wellbeing. Furthermore, most teenagers are unaware of the privacy risks involved in sharing personal information online, making them easy targets for data misuse. For these reasons, social media companies have a responsibility to protect young users by enforcing a minimum age requirement.",
  options:[
    {text:"Millions of teenagers around the world use social media platforms such as Instagram and TikTok every day.", correct:false},
    {text:"I believe that social media platforms should introduce a strict minimum age limit for new users.", correct:true},
    {text:"There are several reasons why social media can have a negative impact on young people.", correct:false},
    {text:"Social media and young people have always had a complicated and difficult relationship.", correct:false},
  ],
  hints:[
    "This is a factual observation about usage numbers — it doesn't state any opinion or position. An opinion topic sentence must use language like <em>I believe, In my opinion, I think that</em> and take a clear stance.",
    null,
    "This sounds like the opening of a <em>cause paragraph</em> — it signals you'll explain reasons, not argue a position. The paragraph is trying to persuade the reader to agree with a view, not just list causes.",
    "This is too vague — <em>'complicated and difficult'</em> gives no clear controlling idea. The reader has no idea what specific argument the paragraph will make.",
  ],
  explanation:"Option B is correct. <em>'I believe that'</em> clearly signals an opinion, and <em>'strict minimum age limit'</em> is a precise, arguable claim. The three supporting sentences then each give a specific reason to support this view: mental health, cyberbullying, and privacy risks."
},

// ── 2. TOPIC SENTENCE — Cause (podcast popularity) ────────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this cause paragraph.",
  body:"One reason is the convenience they offer — podcasts can be listened to while commuting, exercising, or doing household chores, fitting easily into a busy daily routine. Another cause is the remarkable variety of content available, covering everything from true crime and history to science and language learning, meaning there is something for virtually everyone. Podcasts are also free or very cheap to access, making them a genuinely affordable alternative to paid media subscriptions. Finally, many listeners feel a strong sense of connection with podcast hosts, whose conversational style feels personal and engaging in a way that traditional broadcast media rarely achieves.",
  options:[
    {text:"Podcasts have become one of the most popular forms of media in the world today.", correct:false},
    {text:"Listening to podcasts has many positive effects on people's knowledge and daily wellbeing.", correct:false},
    {text:"There are several reasons why podcasts have become so popular among modern listeners.", correct:true},
    {text:"Podcasts are better than traditional radio because they are more flexible and personal.", correct:false},
  ],
  hints:[
    "This states a general fact about podcasts' popularity but gives no signal that the paragraph will explain <em>why</em>. A cause topic sentence needs words like <em>reasons, causes</em>, or <em>factors</em>.",
    "Watch out — <em>'positive effects'</em> is an <strong>effect</strong> signal, not a cause signal. But the supporting sentences explain <em>why</em> podcasts are popular, not <em>what they do to people</em>. Match the topic sentence to what follows.",
    null,
    "This is an opinion sentence that compares podcasts to radio — but the paragraph makes no comparison. The paragraph explains causes of popularity, not superiority over other media.",
  ],
  explanation:"Option C is correct. <em>'Several reasons why'</em> clearly signals a cause paragraph, and the controlling idea (popularity of podcasts) matches all four supporting sentences that follow, each introduced with cause language: <em>one reason, another cause, also, finally</em>."
},

// ── 3. TOPIC SENTENCE — Effect (early school start times) ─────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this effect paragraph.",
  body:"First of all, most teenagers who start school before 8 o'clock arrive already exhausted, having had fewer than the recommended eight hours of sleep their developing bodies need. As a result, poor concentration in morning classes leads to lower academic performance and reduced ability to retain new information. Furthermore, chronic tiredness has a direct negative impact on students' emotional wellbeing — tired teenagers are more likely to experience mood swings, irritability, and feelings of hopelessness. Finally, early start times leave students with little or no time for breakfast or morning exercise, both of which are essential for physical health and mental readiness.",
  options:[
    {text:"In my opinion, secondary schools should not begin lessons before nine o'clock in the morning.", correct:false},
    {text:"There are many reasons why schools around the world start so early in the morning.", correct:false},
    {text:"Starting school too early in the morning has several serious negative effects on students.", correct:true},
    {text:"Many schools around the world require students to arrive before eight o'clock in the morning.", correct:false},
  ],
  hints:[
    "This is a clear opinion sentence — it says what <em>should</em> happen. But the paragraph doesn't argue a position — it neutrally describes consequences. Don't confuse opinion paragraphs with effect paragraphs.",
    "This signals a <em>cause paragraph</em> — <em>'reasons why schools start early'</em> would introduce explanations for early start times. But the paragraph describes what early start times <em>do to students</em>, not why schools choose them.",
    null,
    "This is a factual description of current practice — it has no controlling idea and doesn't signal what the paragraph will discuss. A strong topic sentence must tell the reader what the paragraph will focus on.",
  ],
  explanation:"Option C is correct. <em>'Several serious negative effects'</em> clearly signals an effect paragraph. The controlling idea (early start times → harm to students) is then developed through four consequences: sleep deprivation, poor academic performance, emotional impact, and no time for breakfast or exercise."
},

// ── 4. TOPIC SENTENCE — Similarity (books vs films) ──────────
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this similarity paragraph.",
  body:"Both books and films tell stories that allow audiences to experience different lives, travel to distant places, and feel emotions they might not encounter in their own everyday lives. Similarly, both require a degree of active imagination — readers picture scenes and characters in their minds, while viewers interpret meaning, mood, and subtext from the visuals they see on screen. In the same way, both can educate as well as entertain, covering subjects that range from history and science to personal relationships and social justice. Furthermore, both books and films have the power to create deep emotional connections between audiences and the characters whose journeys they follow.",
  options:[
    {text:"Books and films are two of the most popular and widely available forms of entertainment in the world.", correct:false},
    {text:"Books and films are very different from each other in format, cost, and the experience they offer.", correct:false},
    {text:"Despite being very different media, books and films share several important and surprising qualities.", correct:true},
    {text:"In my opinion, reading books is a far more valuable and enriching experience than watching films.", correct:false},
  ],
  hints:[
    "This is a general, vague fact about popularity — it doesn't signal that the paragraph will focus on <em>how books and films are alike</em>. A similarity topic sentence must clearly indicate that two things will be compared as similar.",
    "This signals a <em>contrast</em> paragraph — <em>'very different'</em> sets up differences. But every supporting sentence in this paragraph uses similarity language: <em>both, similarly, in the same way</em>.",
    null,
    "This is a personal opinion that argues books are <em>better</em> than films — a different purpose entirely. The paragraph treats both equally, focusing on what they share rather than ranking them.",
  ],
  explanation:"Option C is correct. The phrase <em>'share several important and surprising qualities'</em> clearly signals a similarities paragraph, and the opening concession (<em>'despite being very different media'</em>) adds sophistication by acknowledging the contrast before pivoting to similarities. All four supporting sentences then develop a specific shared quality."
},

// ── 5. TOPIC SENTENCE — Contrast (fast fashion vs sustainable) ─
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this contrast paragraph.",
  body:"Fast fashion items are typically very cheap and accessible, whereas sustainable clothing tends to cost significantly more due to the higher quality materials and ethical production processes involved. Furthermore, fast fashion garments are often designed to be worn only a handful of times before falling apart, while sustainable pieces are made to last for years — or even decades. In addition, the environmental impact of the two industries could not be more different: fast fashion is one of the world's biggest polluters, whereas sustainable brands work to minimise waste, carbon emissions, and water usage. Finally, fast fashion relies heavily on poorly paid labour in developing countries, while sustainable brands prioritise fair wages and safe working conditions.",
  options:[
    {text:"Both fast fashion and sustainable fashion have millions of loyal customers around the world.", correct:false},
    {text:"Fast fashion is clearly damaging to the environment and should be replaced by more sustainable alternatives.", correct:false},
    {text:"Fast fashion and sustainable fashion are different from each other in several important and fundamental ways.", correct:true},
    {text:"There are several reasons why the fast fashion industry has grown so rapidly over the past two decades.", correct:false},
  ],
  hints:[
    "<em>'Both'</em> is a similarity signal — it presents the two things as sharing something. But every supporting sentence in this paragraph highlights a <em>difference</em> using contrast signal words like <em>whereas</em> and <em>while</em>.",
    "This is a strong opinion sentence, but the paragraph is a neutral contrast — it describes differences without taking sides or recommending one over the other. Don't confuse a contrast paragraph with an opinion paragraph.",
    null,
    "This is a cause topic sentence — it signals the paragraph will explain why fast fashion grew. But the paragraph compares two types of fashion; it never explains the reasons for growth.",
  ],
  explanation:"Option C is correct. <em>'Different from each other in several important and fundamental ways'</em> clearly signals a contrast paragraph. Both subjects are introduced, the direction (differences) is stated, and all four supporting sentences then develop one specific contrast each, consistently using <em>whereas</em> and <em>while</em>."
},

// ── 6. TOPIC SENTENCE — Opinion, harder (fast fashion regulation)
{
  type:"mc", typeLabel:"Topic Sentence", typeClass:"tag-ts",
  instruction:"Choose the best <strong>topic sentence</strong> for this opinion paragraph.",
  body:"To begin with, the fast fashion industry is responsible for approximately 10% of global carbon emissions and produces 92 million tonnes of textile waste every year — figures that are simply unsustainable for the planet. In addition, the industry's reliance on extremely cheap labour means that millions of garment workers, mostly women in developing countries, earn wages far below the living wage and work in dangerous conditions. Furthermore, fast fashion actively encourages a throwaway culture in which clothing is treated as disposable, undermining the value of craftsmanship and driving overconsumption on a massive scale. For all these reasons, the fast fashion industry cannot continue to operate without serious and urgent consequences for people and the planet.",
  options:[
    {text:"Fast fashion brands produce millions of new clothing items every single season of the year.", correct:false},
    {text:"Fast fashion has both positive and negative effects on consumers, workers, and the environment.", correct:false},
    {text:"It is clear that the fast fashion industry causes serious harm and must face much stricter regulation.", correct:true},
    {text:"There are several reasons why fast fashion has become so popular and so widely available globally.", correct:false},
  ],
  hints:[
    "This is a factual description of what fast fashion companies do — it states no opinion and sets no direction for an argument. An opinion topic sentence must take a position and signal what the paragraph will argue.",
    "This sentence promises to discuss <em>both sides</em> — positives and negatives. But the paragraph presents only negative arguments. If your topic sentence promises balance, your paragraph must deliver balance. They must match.",
    null,
    "This is a cause topic sentence — it promises to explain <em>why</em> fast fashion became popular. But the paragraph argues about the <em>harms</em> of fast fashion, not the reasons for its growth. The paragraph's purpose and the topic sentence's promise are completely mismatched.",
  ],
  explanation:"Option C is correct. <em>'It is clear that... causes serious harm'</em> is a strong, arguable opinion claim. <em>'Must face much stricter regulation'</em> is the specific policy position the paragraph builds toward. All three supporting sentences then provide evidence (environmental damage, worker exploitation, throwaway culture) to support this claim."
},

// ── 7. ODD ONE OUT — Opinion (social media age limits) ────────
{
  type:"odd", typeLabel:"Odd One Out", typeClass:"tag-ooo",
  instruction:"Click on the sentence that <strong>does NOT belong</strong> in this opinion paragraph about why social media is harmful for young people.",
  sentences:[
    {text:"1. Excessive use of social media has been directly linked to higher rates of anxiety, depression, and poor self-image among teenagers.", correct:false, hint:"This is a clear supporting reason: social media harms mental health. It belongs in the paragraph."},
    {text:"2. Cyberbullying is far more common on social media platforms than in face-to-face environments, creating serious safety risks.", correct:false, hint:"This gives another reason why social media is harmful — cyberbullying. It supports the main argument."},
    {text:"3. As a result, many young people who have experienced online bullying report feeling isolated, anxious, and reluctant to attend school.", correct:true, hint:"All the other sentences explain <em>why</em> social media is harmful — they give causes or reasons. What is this sentence doing instead?"},
    {text:"4. Young users frequently share personal data without realising the serious privacy and security risks involved.", correct:false, hint:"This gives a third reason: privacy risks. It supports the paragraph's main idea."},
    {text:"5. For all these reasons, it is essential that social media platforms take greater responsibility for the safety of young users.", correct:false, hint:"This is a strong concluding sentence that restates the paragraph's overall argument. It belongs here."},
  ],
  explanation:"Sentence 3 is the odd one out — but notice how subtle it is. It uses <em>'as a result'</em> and describes a <em>consequence</em> of cyberbullying, not a <em>reason</em> why social media is harmful. This is an <strong>effect sentence in a cause/opinion paragraph</strong>. All other sentences give reasons or arguments; this one accidentally shifts into effect territory."
},

// ── 8. ODD ONE OUT — Cause (podcast popularity) ───────────────
{
  type:"odd", typeLabel:"Odd One Out", typeClass:"tag-ooo",
  instruction:"Click on the sentence that <strong>does NOT belong</strong> in this cause paragraph about why podcasts have become so popular.",
  sentences:[
    {text:"1. One reason is their convenience — podcasts can be listened to hands-free during commutes, gym sessions, or household tasks.", correct:false, hint:"This identifies a clear cause of podcast popularity: convenience. It belongs here."},

  instruction:"Which sentence would make the strongest <strong>topic sentence for an opinion paragraph</strong> about early school start times?",
  options:[
    {text:"In many countries, secondary schools require students to arrive between 7:30 and 8:30 in the morning.", correct:false},
    {text:"Research consistently shows that teenagers need between eight and ten hours of sleep per night.", correct:false},
    {text:"School start times vary considerably from one country and education system to another.", correct:false},
    {text:"In my view, secondary schools should not begin lessons before 9 o'clock, as earlier start times seriously harm students' health and learning.", correct:true},
  ],
  hints:[
    "This is a factual description of current practice in many schools. It takes no position and gives no controlling idea for an argument. A topic sentence for an opinion paragraph must state a debatable claim.",
    "This is a factual statistic from scientific research. Although it might support an opinion paragraph, it is not itself an opinion — it doesn't tell the reader what the writer <em>believes should happen</em>.",
    "This is a neutral, descriptive observation about global variation. It takes no stance and gives no direction for an argument.",
    null,
  ],
  explanation:"Option D is correct. It contains all the elements of a strong opinion topic sentence: a clear signal phrase (<em>'In my view'</em>), a specific, arguable claim (<em>'should not begin before 9 o'clock'</em>), and even a brief reason (<em>'as earlier start times seriously harm students'</em>) that previews the paragraph's argument. Options A, B, and C are all factual statements — none of them commit to a position."
},

]; // end questions

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let current = 0, score = 0;
let userAnswers = [];
let hintedThisQ = false;

function renderQuestion() {
  hintedThisQ = false;
  const q = questions[current];
  const area = document.getElementById("quiz-area");
  area.innerHTML = "";

  document.getElementById("prog-label").textContent = `Question ${current+1} of ${questions.length}`;
  document.getElementById("score-label").textContent = `Score: ${score}`;
  document.getElementById("prog-fill").style.width = `${((current+1)/questions.length)*100}%`;

  const card = document.createElement("div");
  card.className = "card";

  const challengeNote = q.challenge
    ? `<div class="challenge-note">⚠️ All options begin with the same signal phrase — focus on the content.</div>`
    : "";

  card.innerHTML = `
    <div class="card-tag">
      <span class="tag-pill ${q.typeClass}">${q.typeLabel}</span>
    </div>
    <div class="card-body">
      <p class="question-text">${q.instruction}</p>
      ${challengeNote}
      ${q.body ? `<div class="para-box">${q.body}</div>` : ""}
      <div id="interaction-area"></div>
      <div class="hint-box" id="hint-box"></div>
      <div class="show-why-wrap" id="show-why-wrap">
        <button class="show-why-btn" id="show-why-btn">Show me why →</button>
      </div>
      <div class="feedback" id="feedback-box"></div>
    </div>
  `;
  area.appendChild(card);

  const nextWrap = document.createElement("div");
  nextWrap.className = "next-wrap";
  nextWrap.id = "next-wrap";
  const isLast = current === questions.length - 1;
  nextWrap.innerHTML = `<button class="next-btn" onclick="${isLast ? 'showResults()' : 'nextQuestion()'}">${isLast ? "See Results →" : "Next Question →"}</button>`;
  card.appendChild(nextWrap);

  if (q.type === "odd") buildOdd(q);
  else buildMC(q);
}

function buildMC(q) {
  const ia = document.getElementById("interaction-area");
  const letters = ["A","B","C","D"];
  const div = document.createElement("div");
  div.className = "options";
  q.options.forEach((opt, i) => {
    const btn = document.createElement("button");
    btn.className = "option-btn";
    btn.dataset.idx = i;
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
    btn.onclick = () => handleMC(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleMC(q, idx, container) {
  const btns = container.querySelectorAll(".option-btn");
  const isCorrect = q.options[idx].correct;
  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.options[idx].text.substring(0,65)});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    hintedThisQ = true;
    btns[idx].classList.add("state-hinted");
    btns[idx].disabled = true;
    const hintBox = document.getElementById("hint-box");
    hintBox.innerHTML = `<div class="hint-label">💡 Hint</div>${q.hints[idx]}`;
    hintBox.classList.add("show");
    const showWrap = document.getElementById("show-why-wrap");
    showWrap.classList.add("show");
    document.getElementById("show-why-btn").onclick = () => revealMC(q, idx, container);
  }
}

function revealMC(q, clickedIdx, container) {
  const btns = container.querySelectorAll(".option-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (q.options[i].correct) b.classList.add("state-reveal-correct");
    else if (i === clickedIdx) b.classList.add("state-wrong");
  });
  document.getElementById("show-why-wrap").classList.remove("show");
  showFeedback(false, q.explanation);
  userAnswers.push({correct:false, firstTry:false, label: q.options[clickedIdx].text.substring(0,65)});
  document.getElementById("next-wrap").classList.add("show");
}

function buildOdd(q) {
  const ia = document.getElementById("interaction-area");
  const div = document.createElement("div");
  div.className = "sentences";
  q.sentences.forEach((s, i) => {
    const btn = document.createElement("button");
    btn.className = "sentence-btn";
    btn.innerHTML = s.text;
    btn.onclick = () => handleOdd(q, i, div);
    div.appendChild(btn);
  });
  ia.appendChild(div);
}

function handleOdd(q, idx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  const isCorrect = q.sentences[idx].correct;
  if (isCorrect) {
    btns.forEach(b => b.disabled = true);
    btns[idx].classList.add("state-correct");
    showFeedback(true, q.explanation);
    const firstTry = !hintedThisQ;
    if (firstTry) score++;
    userAnswers.push({correct:true, firstTry, label: q.sentences[idx].text.substring(0,65)});
    document.getElementById("score-label").textContent = `Score: ${score}`;
    document.getElementById("next-wrap").classList.add("show");
  } else {
    hintedThisQ = true;
    btns[idx].classList.add("state-hinted");
    btns[idx].disabled = true;
    const hintBox = document.getElementById("hint-box");
    hintBox.innerHTML = `<div class="hint-label">💡 Hint</div>${q.sentences[idx].hint}`;
    hintBox.classList.add("show");
    const showWrap = document.getElementById("show-why-wrap");
    showWrap.classList.add("show");
    document.getElementById("show-why-btn").onclick = () => revealOdd(q, idx, container);
  }
}

function revealOdd(q, clickedIdx, container) {
  const btns = container.querySelectorAll(".sentence-btn");
  btns.forEach((b, i) => {
    b.disabled = true;
    if (q.sentences[i].correct) b.classList.add("state-reveal-correct");
    else if (i === clickedIdx) b.classList.add("state-reveal-wrong");
  });
  document.getElementById("show-why-wrap").classList.remove("show");
  showFeedback(false, q.explanation);
  userAnswers.push({correct:false, firstTry:false, label: q.sentences[clickedIdx].text.substring(0,65)});
  document.getElementById("next-wrap").classList.add("show");
}

function showFeedback(isCorrect, explanation) {
  const box = document.getElementById("feedback-box");
  document.getElementById("hint-box").classList.remove("show");
  document.getElementById("show-why-wrap").classList.remove("show");
  box.className = `feedback show ${isCorrect ? "fb-correct" : "fb-wrong"}`;
  box.innerHTML = (isCorrect ? "<strong>✓ Correct!</strong> " : "<strong>Here's why:</strong> ") + explanation;
}

function nextQuestion() {
  current++;
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

function showResults() {
  document.getElementById("quiz-area").style.display = "none";
  document.querySelector(".progress-wrap").style.display = "none";
  const screen = document.getElementById("results-screen");
  screen.classList.add("show");
  const pct = score / questions.length;
  const circumference = 345.4;
  setTimeout(() => {
    document.getElementById("ring-fill").style.strokeDashoffset = circumference - pct * circumference;
  }, 100);
  document.getElementById("score-display").textContent = `${score}/${questions.length}`;
  let title, sub;
  if (pct === 1)        { title = "Perfect score! 🎉"; sub = "Exceptional — you handled every challenge!"; }
  else if (pct >= 0.88) { title = "Excellent work! ✨"; sub = "Very strong analytical reading skills."; }
  else if (pct >= 0.72) { title = "Well done! 👍"; sub = "Good effort — review the trickier questions carefully."; }
  else if (pct >= 0.56) { title = "Good effort! 📝"; sub = "This set is harder — try again and trust your instincts."; }
  else                  { title = "Keep going! 📚"; sub = "The challenge level is high — every attempt builds your skills."; }
  document.getElementById("results-title").textContent = title;
  document.getElementById("results-sub").textContent = sub;

  const reviewList = document.getElementById("review-list");
  const typeLabels = { mc: q => q.typeLabel, odd: q => q.typeLabel };
  questions.forEach((q, i) => {
    const ua = userAnswers[i];
    const div = document.createElement("div");
    div.className = "review-item";
    const icon = !ua ? "⬜" : (ua.correct && ua.firstTry ? "✅" : ua.correct ? "✅" : "❌");
    const triesNote = ua && ua.correct && !ua.firstTry ? " (needed a hint)" : ua && !ua.correct ? " (shown answer)" : "";
    div.innerHTML = `
      <span class="review-icon">${icon}</span>
      <div>
        <div class="review-q">Q${i+1} · ${q.typeLabel}</div>
        <div class="review-ans">${ua ? ua.label + "…" : "Not answered"}</div>
        ${triesNote ? `<div class="review-tries">${triesNote}</div>` : ""}
      </div>`;
    reviewList.appendChild(div);
  });
  window.scrollTo({top:0, behavior:"smooth"});
}

function restart() {
  current = 0; score = 0; userAnswers = [];
  document.getElementById("results-screen").classList.remove("show");
  document.getElementById("quiz-area").style.display = "";
  document.querySelector(".progress-wrap").style.display = "";
  renderQuestion();
  window.scrollTo({top:0, behavior:"smooth"});
}

renderQuestion();
</script>
</body>
</html>
